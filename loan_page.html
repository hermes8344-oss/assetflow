<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>대출 관리 - AssetFlow</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: #1a1a1a;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding-bottom: 100px;
  }

  /* ── 헤더 ── */
  .header {
    display: flex; align-items: center;
    padding: 16px 20px;
    position: sticky; top: 0;
    background: #1a1a1a; z-index: 100;
  }
  .back-btn { background:none; border:none; color:#fff; font-size:22px; cursor:pointer; padding:4px 8px 4px 0; line-height:1; }

  /* ── 총 대출 요약 ── */
  .summary-card {

  }
  .sc-label  { font-size:13px; color:#888; margin-bottom:6px; }

  .lc-bank-icon {

  .ei-actions { display:flex; gap:8px; flex-shrink:0; }
  .btn-ea { background:#3a3a3a; border:none; border-radius:8px; color:#ccc; font-size:12px; padding:6px 10px; cursor:pointer; }

  .f-row   { display:flex; flex-direction:column; gap:4px; }
  .f-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

  /* 선택 그리드 */
  .sel-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .sel-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .sel-grid-5 { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
  .type-btn {

  }

  /* 실시간 계산 미리보기 (폼 내) */
  .calc-preview {

  }
  .cp-title { font-size:12px; color:#555; margin-bottom:10px; font-weight:600; }
  .cp-row   { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid #2a2a2a; }
  .cp-row:last-child { border-bottom:none; }
  .cp-label { font-size:13px; color:#888; }
  .cp-value { font-size:13px; font-weight:600; color:#fff; }
  .cp-value.orange { color:#fb923c; }
  .cp-value.red    { color:#f87171; }

  .form-section-label {

  }

  .btn-submit {

<body>

<div class="header">
  <button class="back-btn" onclick="location.href='asset_manager_mobile.html'">‹</button>
  <span class="header-title">대출</span>
</div>

<div class="summary-card">
  <div class="sc-label">총 대출 잔액</div>
  <div class="sc-amount" id="totalBalance">—</div>
  <div class="sc-sub"   id="totalSub">—</div>
</div>

<div class="loan-list" id="loanList"></div>

<div class="bottom-nav">
  <button class="nav-btn" onclick="openEditModal()">⚙️ 자산 편집하기</button>
</div>

<div class="edit-overlay" id="editOverlay" onclick="if(event.target===this)closeEditModal()">
  <div class="edit-sheet">
    <div class="modal-handle"></div>
    <div id="editContent"></div>
  </div>
</div>

<script>

/* ── 사용자 prefix 시스템 ── */
function getPrefix(){
  return localStorage.getItem('af_active_prefix')||'u1_';
}
function pk(key){ return getPrefix()+key; }
/* ══════════════════════════════════════
   상수
══════════════════════════════════════ */
const LOAN_TYPES   = ['주택담보','전세자금','신용대출','마이너스통장','기타'];
const REPAY_METHODS = [
  { key:'equal_payment', label:'원리금\n균등', desc:'매달 동일한 금액을 납부해요. 초기 이자 부담이 크고 후반엔 원금 상환 비중이 높아져요.' },
  { key:'equal_principal', label:'원금\n균등',  desc:'매달 원금을 균등하게 상환하고 이자는 줄어들어요. 초기 납부액이 크지만 총 이자가 적어요.' },
  { key:'increasing',  label:'체증식',           desc:'초기 납부액이 낮고 매년 일정 비율로 증가해요. 소득이 늘어날 예정인 경우 적합해요.' },
];
const BANK_ICONS = {
  '신한은행':'💙','KB국민':'⭐','우리은행':'💚','하나은행':'🟢',
  'NH농협':'🌾','IBK기업':'🏛','토스뱅크':'🔵','카카오뱅크':'💛',
  'SC제일':'🔷','씨티은행':'🏦','우체국':'📮','기타':'🏦'
};

const DEFAULT_LOANS = [{
  id:1, name:'가계일반자금대출(분할상환)-등기전신용대출',
  bank:'신한은행', bankIcon:'💙', loanType:'주택담보',
  repayMethod:'equal_payment',
  balance:493687817, rate:4.04,
  startDate:'2022-04-30', endDate:'2052-04-30', interestDay:30,
}];

function loadLoans(){ try{const s=localStorage.getItem(pk('af_loans')); return s?JSON.parse(s):DEFAULT_LOANS;} catch{return DEFAULT_LOANS;} }
function saveLoans(d){ localStorage.setItem(pk('af_loans'),JSON.stringify(d)); }

let loans = loadLoans();

/* ══════════════════════════════════════
   계산 엔진
══════════════════════════════════════ */

/**
 * 원리금균등상환 (Annuity)
 * 매달 납부액 = P * r(1+r)^n / ((1+r)^n - 1)
 */
function calcEqualPayment(principal, annualRate, totalMonths){
  const r = annualRate / 100 / 12;
  if(r === 0) return { monthly:principal/totalMonths, totalInterest:0, totalPayment:principal };
  const monthly = principal * r * Math.pow(1+r, totalMonths) / (Math.pow(1+r, totalMonths) - 1);
  const totalPayment = monthly * totalMonths;
  return { monthly, totalInterest: totalPayment - principal, totalPayment };
}

/**
 * 원금균등상환
 * 매달 원금: P/n
 * 매달 이자: (P - 상환원금누계) * r
 * 첫달 / 마지막달 따로 계산
 */
function calcEqualPrincipal(principal, annualRate, totalMonths){
  const r = annualRate / 100 / 12;
  const monthlyPrincipal = principal / totalMonths;
  const firstMonthly  = monthlyPrincipal + principal * r;
  const lastMonthly   = monthlyPrincipal + monthlyPrincipal * r; // 마지막달
  let totalInterest = 0;
  for(let i=0; i<totalMonths; i++){
    totalInterest += (principal - monthlyPrincipal * i) * r;
  }
  return { firstMonthly, lastMonthly, monthlyPrincipal, totalInterest, totalPayment: principal + totalInterest };
}

/**
 * 체증식상환
 * 초기 월 납부액 = (P * r) / (1 - (1+r)^(-n)) 에서 출발하는 변형
 * 실무: 초기 1년은 이자만 납부, 이후 매년 일정 금액씩 원금 추가
 * 여기서는 표준 체증식: 첫해 납부액 = 원리금균등의 약 60%, 매년 일정 금액 증가
 */
function calcIncreasing(principal, annualRate, totalMonths){
  const r = annualRate / 100 / 12;
  const years = Math.ceil(totalMonths / 12);
  // 시뮬레이션: 초기 납부액 X, 매년 증가액 d 를 구해서 잔액이 0이 되도록 역산
  // 단순화: 원리금균등 기준으로 첫해를 65% 수준으로 시작, 매년 (1-0.65)/years 씩 증가
  const equalPayment = calcEqualPayment(principal, annualRate, totalMonths).monthly;
  const startRatio = 0.65;
  const firstMonthly = equalPayment * startRatio;
  const annualIncrease = (equalPayment - firstMonthly) / (years - 1) || 0;

  // 실제 총 이자 시뮬레이션
  let remaining = principal;
  let totalInterest = 0;
  let totalPayment  = 0;
  for(let m=0; m<totalMonths; m++){
    const year = Math.floor(m/12);
    const monthlyPayment = firstMonthly + annualIncrease * year;
    const interest = remaining * r;
    const principalPart = monthlyPayment - interest;
    totalInterest += interest;
    totalPayment  += monthlyPayment;
    remaining     -= principalPart;
    if(remaining < 0) remaining = 0;
  }

  const lastYear = years - 1;
  const lastMonthly = firstMonthly + annualIncrease * lastYear;
  return { firstMonthly, lastMonthly, annualIncrease, totalInterest, totalPayment };
}

/** 현재 시점 기준 경과 개월 */
function elapsedMonths(startDate){
  if(!startDate) return 0;
  const now   = new Date();
  const start = new Date(startDate);
  return Math.max(0, (now.getFullYear()-start.getFullYear())*12 + now.getMonth()-start.getMonth());
}

/** 전체 개월 수 */
function totalMonthsBetween(startDate, endDate){
  if(!startDate||!endDate) return 0;
  const s = new Date(startDate), e = new Date(endDate);
  return Math.max(1, (e.getFullYear()-s.getFullYear())*12 + e.getMonth()-s.getMonth());
}

/** 남은 개월 → 표시 문자열 */
function remainStr(months){
  if(months<=0) return '만기 도래';
  const y=Math.floor(months/12), m=months%12;
  if(y>0&&m>0) return `${y}년 ${m}개월 남음`;
  if(y>0)      return `${y}년 남음`;
  return `${m}개월 남음`;
}

function fmtWon(n){ return Math.round(n).toLocaleString('ko-KR')+'원'; }
function fmtWonShort(n){
  n=Math.round(n);
  if(n>=100000000){ const u=Math.floor(n/100000000); const r=n%100000000; return r>0?`${u}억 ${r.toLocaleString('ko-KR')}원`:`${u}억원`; }
  if(n>=10000){ const u=Math.floor(n/10000); const r=n%10000; return r>0?`${u}만 ${r.toLocaleString('ko-KR')}원`:`${u}만원`; }
  return n.toLocaleString('ko-KR')+'원';
}

/* ══════════════════════
   렌더링
══════════════════════ */
function renderPage(){
  const total = loans.reduce((s,l)=>s+l.balance,0);
  document.getElementById('totalBalance').textContent = fmtWon(total);
  document.getElementById('totalSub').textContent = '총 '+loans.length+'건의 대출';

  const el = document.getElementById('loanList');
  if(!loans.length){
    el.innerHTML=`<div class="empty-state"><div class="empty-icon">🏠</div><div class="empty-text">등록된 대출이 없어요<br><span style="font-size:12px;color:#555">자산 편집하기에서 추가해보세요</span></div></div>`;
    return;
  }

  el.innerHTML = loans.map(l => loanCardHTML(l)).join('');
}

function loanCardHTML(l){
  const totM   = totalMonthsBetween(l.startDate, l.endDate);
  const elapsed = elapsedMonths(l.startDate);
  const remain  = Math.max(0, totM - elapsed);
  const pct     = totM > 0 ? Math.min(100,(elapsed/totM)*100) : 0;
  const startDisp = l.startDate||'—';
  const endDisp   = l.endDate  ||'—';
  const totY = Math.floor(totM/12);

  const method = REPAY_METHODS.find(m=>m.key===l.repayMethod)||REPAY_METHODS[0];
  const methodLabel = method.label.replace('\n','');

  // 상환 계산
  let calcHTML = '';
  if(totM > 0 && l.balance > 0 && l.rate > 0){
    if(l.repayMethod === 'equal_payment'){
      const res = calcEqualPayment(l.balance, l.rate, remain||totM);
      calcHTML = `
        <div class="calc-box">
          <div class="calc-box-title">💰 월 납부 계산 (원리금균등 · 잔여 ${remainStr(remain)})</div>
          <div class="calc-row"><span class="calc-row-label">매달 납부액</span><span class="calc-row-value highlight">${fmtWon(res.monthly)}</span></div>
          <div class="calc-row"><span class="calc-row-label">이 중 이자</span><span class="calc-row-value red">${fmtWon(res.monthly - l.balance/((remain||totM)))}</span></div>
          <div class="calc-row"><span class="calc-row-label">남은 총 이자</span><span class="calc-row-value red">${fmtWon(res.totalInterest)}</span></div>
          <div class="calc-row"><span class="calc-row-label">남은 총 상환액</span><span class="calc-row-value">${fmtWon(res.totalPayment)}</span></div>
        </div>`;
    } else if(l.repayMethod === 'equal_principal'){
      const res = calcEqualPrincipal(l.balance, l.rate, remain||totM);
      calcHTML = `
        <div class="calc-box">
          <div class="calc-box-title">💰 월 납부 계산 (원금균등 · 잔여 ${remainStr(remain)})</div>
          <div class="calc-row"><span class="calc-row-label">이번 달 납부액</span><span class="calc-row-value highlight">${fmtWon(res.firstMonthly)}</span></div>
          <div class="calc-row"><span class="calc-row-label">매달 원금 상환</span><span class="calc-row-value">${fmtWon(res.monthlyPrincipal)}</span></div>
          <div class="calc-row"><span class="calc-row-label">마지막 달 납부액</span><span class="calc-row-value green">${fmtWon(res.lastMonthly)}</span></div>
          <div class="calc-row"><span class="calc-row-label">남은 총 이자</span><span class="calc-row-value red">${fmtWon(res.totalInterest)}</span></div>
          <div class="calc-row"><span class="calc-row-label">남은 총 상환액</span><span class="calc-row-value">${fmtWon(res.totalPayment)}</span></div>
        </div>`;
    } else if(l.repayMethod === 'increasing'){
      const res = calcIncreasing(l.balance, l.rate, remain||totM);
      calcHTML = `
        <div class="calc-box">
          <div class="calc-box-title">💰 월 납부 계산 (체증식 · 잔여 ${remainStr(remain)})</div>
          <div class="calc-row"><span class="calc-row-label">현재 월 납부액</span><span class="calc-row-value highlight">${fmtWon(res.firstMonthly)}</span></div>
          <div class="calc-row"><span class="calc-row-label">매년 증가액</span><span class="calc-row-value">${fmtWon(res.annualIncrease)}</span></div>
          <div class="calc-row"><span class="calc-row-label">최종 월 납부액</span><span class="calc-row-value red">${fmtWon(res.lastMonthly)}</span></div>
          <div class="calc-row"><span class="calc-row-label">남은 총 이자</span><span class="calc-row-value red">${fmtWon(res.totalInterest)}</span></div>
          <div class="calc-row"><span class="calc-row-label">남은 총 상환액</span><span class="calc-row-value">${fmtWon(res.totalPayment)}</span></div>
          <div class="calc-notice">※ 체증식은 실제 은행 조건에 따라 달라질 수 있어요</div>
        </div>`;
    }
  }

  return `
  <div class="loan-card">
    <div class="lc-top">
      <div class="lc-bank-icon" style="background:${bankBg(l.bank)}">${l.bankIcon||'🏦'}</div>
      <div class="lc-bank-info">
        <div class="lc-bank-name">${l.bank} · ${l.loanType||''}</div>
        <div class="lc-loan-name">${l.name}</div>
      </div>
    </div>

    <div class="lc-main">
      <span class="lc-balance">${fmtWon(l.balance)}</span>
      <span class="lc-rate">${l.rate}%</span>
      <span class="lc-method-badge">${methodLabel}</span>
    </div>

    <div class="lc-info-grid">
      <div><div class="lc-info-label">대출 시작일</div><div class="lc-info-value">${startDisp}</div></div>
      <div><div class="lc-info-label">만기일</div><div class="lc-info-value">${endDisp}</div></div>
      <div><div class="lc-info-label">대출 기간</div><div class="lc-info-value">${totY>0?totY+'년':totM+'개월'}</div></div>
      <div><div class="lc-info-label">연 금리</div><div class="lc-info-value">${l.rate}%</div></div>
    </div>

    <div class="lc-progress-wrap">
      <div class="lc-progress-top">
        <span>${startDisp.slice(0,7)} 시작</span>
        <span>${remainStr(remain)}</span>
        <span>${endDisp.slice(0,7)} 만기</span>
      </div>
      <div class="lc-progress-bar">
        <div class="lc-progress-fill" style="width:${pct.toFixed(1)}%"></div>
      </div>
    </div>

    ${l.interestDay ? `
    <div class="lc-interest-day">
      <div class="lc-interest-dot"></div>
      <span class="day-label">이자 나가는 날</span>
      <span class="day-value">매월 ${l.interestDay}일</span>
    </div>` : ''}

    ${calcHTML}
  </div>`;
}

function bankBg(bank){
  const m={'신한은행':'#0046a015','KB국민':'#f5c51815','우리은행':'#007b4015','하나은행':'#00854915','NH농협':'#00843415','IBK기업':'#005bac15','토스뱅크':'#0064ff15','카카오뱅크':'#fee50015'};
  return m[bank]||'#33333322';
}

/* ══════════════════════
   편집 모달
══════════════════════ */
function openEditModal(){ showEditMain(); document.getElementById('editOverlay').classList.add('active'); }
function closeEditModal(){ document.getElementById('editOverlay').classList.remove('active'); }

function showEditMain(){
  document.getElementById('editContent').innerHTML=`
    <div class="modal-title">대출 편집</div>
    <div class="edit-list">${
      loans.length ? loans.map(l=>`
        <div class="edit-item">
          <div class="ei-icon" style="background:${bankBg(l.bank)}">${l.bankIcon||'🏦'}</div>
          <div class="ei-info">
            <div class="ei-name">${l.name}</div>
            <div class="ei-sub">${l.bank} · ${l.rate}% · ${fmtWonShort(l.balance)}</div>
          </div>
          <div class="ei-actions">
            <button class="btn-ea" onclick="showForm(${l.id})">수정</button>
            <button class="btn-ea del" onclick="deleteLoan(${l.id})">삭제</button>
          </div>
        </div>`).join('') : '<div style="color:#555;font-size:13px;padding:8px 0">등록된 대출이 없어요</div>'
    }</div>
    <button class="btn-add" onclick="showForm(null)">＋ 대출 추가하기</button>`;
}

/* ── 공용 폼 ── */
function showForm(id){
  const p = id ? loans.find(x=>x.id===id) : {};
  const isEdit = !!id;

  document.getElementById('editContent').innerHTML=`
    <div class="modal-title">${isEdit?'대출 수정':'대출 추가'}</div>
    <div class="add-form">

      <div class="form-section-label">기본 정보</div>

      <div class="f-row">
        <div class="f-label">대출 종류</div>
        <div class="sel-grid-5" id="loanTypeGrid">
          ${LOAN_TYPES.map(t=>`<button class="type-btn ${(p.loanType||LOAN_TYPES[0])===t?'active':''}" data-v="${t}" onclick="pickBtn(this,'loanTypeGrid')">${t}</button>`).join('')}
        </div>
      </div>

      <div class="f-row">
        <div class="f-label">상환 방식</div>
        <div class="sel-grid-3" id="repayGrid">
          ${REPAY_METHODS.map(m=>`<button class="type-btn ${(p.repayMethod||'equal_payment')===m.key?'active':''}" data-v="${m.key}" onclick="pickRepay(this)" style="white-space:pre-line;font-size:12px;">${m.label}</button>`).join('')}
        </div>
        <div class="method-desc" id="methodDesc">${REPAY_METHODS.find(m=>m.key===(p.repayMethod||'equal_payment')).desc}</div>
      </div>

      <div class="f-row">
        <div class="f-label">대출명</div>
        <input class="f-input" id="fName" type="text" placeholder="예) 가계일반자금대출" value="${p.name||''}">
      </div>

      <div class="f-row">
        <div class="f-label">은행</div>
        <input class="f-input" id="fBank" type="text" placeholder="예) 신한은행" value="${p.bank||''}" oninput="updateCalcPreview()">
      </div>

      <div class="form-section-label">금액 · 금리</div>

      <div class="f-row">
        <div class="f-label">대출 잔액 (원)</div>
        <input class="f-input" id="fBalance" type="number" inputmode="numeric" placeholder="0" value="${p.balance||''}" oninput="updateCalcPreview()">
      </div>

      <div class="f-row">
        <div class="f-label">연 금리 (%)</div>
        <input class="f-input" id="fRate" type="number" inputmode="decimal" placeholder="예) 4.04" step="0.01" value="${p.rate||''}" oninput="updateCalcPreview()">
      </div>

      <div class="form-section-label">일정</div>

      <div class="f-row-2">
        <div class="f-row">
          <div class="f-label">대출 시작일</div>
          <input class="f-input" id="fStart" type="date" value="${p.startDate||''}" onchange="updateCalcPreview()">
        </div>
        <div class="f-row">
          <div class="f-label">만기일</div>
          <input class="f-input" id="fEnd" type="date" value="${p.endDate||''}" onchange="updateCalcPreview()">
        </div>
      </div>

      <div class="f-row">
        <div class="f-label">이자 나가는 날 (1~31일)</div>
        <input class="f-input" id="fIntDay" type="number" inputmode="numeric" placeholder="예) 30" min="1" max="31" value="${p.interestDay||''}">
      </div>

      <div class="form-section-label">계산 미리보기</div>
      <div class="calc-preview" id="calcPreview">
        <div class="cp-title">금액·금리·기간을 입력하면 자동으로 계산돼요</div>
      </div>

      <button class="btn-submit" onclick="${isEdit?`updateLoan(${id})`:'addLoan()'}">
        ${isEdit?'저장하기':'추가하기'}
      </button>
      <button class="btn-cancel" onclick="showEditMain()">취소</button>
    </div>`;

  updateCalcPreview();
}

function pickBtn(btn, gridId){
  document.querySelectorAll(`#${gridId} .type-btn`).forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function pickRepay(btn){
  pickBtn(btn, 'repayGrid');
  const key = btn.dataset.v;
  const m = REPAY_METHODS.find(x=>x.key===key);
  document.getElementById('methodDesc').textContent = m?.desc||'';
  updateCalcPreview();
}

/* 실시간 계산 미리보기 */
function updateCalcPreview(){
  const balance  = parseInt(document.getElementById('fBalance')?.value)||0;
  const rate     = parseFloat(document.getElementById('fRate')?.value)||0;
  const startVal = document.getElementById('fStart')?.value||'';
  const endVal   = document.getElementById('fEnd')?.value||'';
  const method   = document.querySelector('#repayGrid .type-btn.active')?.dataset.v||'equal_payment';
  const preview  = document.getElementById('calcPreview');
  if(!preview) return;

  if(!balance||!rate||!startVal||!endVal){
    preview.innerHTML='<div class="cp-title" style="color:#555">금액·금리·기간을 입력하면 자동으로 계산돼요</div>';
    return;
  }

  const totM = totalMonthsBetween(startVal, endVal);
  const elapsed = elapsedMonths(startVal);
  const remain = Math.max(1, totM - elapsed);

  let rows = '';
  if(method==='equal_payment'){
    const res = calcEqualPayment(balance, rate, remain);
    rows = `
      <div class="cp-row"><span class="cp-label">매달 납부액</span><span class="cp-value orange">${fmtWon(res.monthly)}</span></div>
      <div class="cp-row"><span class="cp-label">총 이자 부담</span><span class="cp-value red">${fmtWon(res.totalInterest)}</span></div>
      <div class="cp-row"><span class="cp-label">총 상환액</span><span class="cp-value">${fmtWon(res.totalPayment)}</span></div>
      <div class="cp-row"><span class="cp-label">잔여 기간</span><span class="cp-value">${remainStr(remain)}</span></div>`;
  } else if(method==='equal_principal'){
    const res = calcEqualPrincipal(balance, rate, remain);
    rows = `
      <div class="cp-row"><span class="cp-label">이번 달 납부액</span><span class="cp-value orange">${fmtWon(res.firstMonthly)}</span></div>
      <div class="cp-row"><span class="cp-label">매달 원금</span><span class="cp-value">${fmtWon(res.monthlyPrincipal)}</span></div>
      <div class="cp-row"><span class="cp-label">마지막 달 납부액</span><span class="cp-value">${fmtWon(res.lastMonthly)}</span></div>
      <div class="cp-row"><span class="cp-label">총 이자 부담</span><span class="cp-value red">${fmtWon(res.totalInterest)}</span></div>
      <div class="cp-row"><span class="cp-label">잔여 기간</span><span class="cp-value">${remainStr(remain)}</span></div>`;
  } else {
    const res = calcIncreasing(balance, rate, remain);
    rows = `
      <div class="cp-row"><span class="cp-label">현재 월 납부액</span><span class="cp-value orange">${fmtWon(res.firstMonthly)}</span></div>
      <div class="cp-row"><span class="cp-label">매년 증가액</span><span class="cp-value">${fmtWon(res.annualIncrease)}</span></div>
      <div class="cp-row"><span class="cp-label">최종 월 납부액</span><span class="cp-value red">${fmtWon(res.lastMonthly)}</span></div>
      <div class="cp-row"><span class="cp-label">총 이자 부담</span><span class="cp-value red">${fmtWon(res.totalInterest)}</span></div>
      <div class="cp-row"><span class="cp-label">잔여 기간</span><span class="cp-value">${remainStr(remain)}</span></div>`;
  }

  preview.innerHTML = `<div class="cp-title">📊 예상 납부 계획</div>${rows}`;
}

/* CRUD */
function addLoan(){
  const loan=readForm(); if(!loan) return;
  loan.id=Date.now(); loans.push(loan);
  saveLoans(loans); showEditMain(); renderPage();
}
function updateLoan(id){
  const loan=readForm(); if(!loan) return;
  const idx=loans.findIndex(x=>x.id===id);
  if(idx!==-1) loans[idx]={...loans[idx],...loan};
  saveLoans(loans); showEditMain(); renderPage();
}
function deleteLoan(id){
  loans=loans.filter(x=>Number(x.id)!==Number(id));
  saveLoans(loans); showEditMain(); renderPage();
}

function readForm(){
  const name    = document.getElementById('fName').value.trim();
  const bank    = document.getElementById('fBank').value.trim();
  const balance = parseInt(document.getElementById('fBalance').value)||0;
  const rate    = parseFloat(document.getElementById('fRate').value)||0;
  const start   = document.getElementById('fStart').value;
  const end     = document.getElementById('fEnd').value;
  const intDay  = parseInt(document.getElementById('fIntDay').value)||0;
  const loanType  = document.querySelector('#loanTypeGrid .type-btn.active')?.dataset.v||LOAN_TYPES[0];
  const repayMethod = document.querySelector('#repayGrid .type-btn.active')?.dataset.v||'equal_payment';
  const bankIcon  = BANK_ICONS[bank]||'🏦';

  if(!name)   { alert('대출명을 입력해주세요.');  return null; }
  if(!bank)   { alert('은행을 입력해주세요.');    return null; }
  if(!balance){ alert('대출 잔액을 입력해주세요.'); return null; }
  if(!rate)   { alert('금리를 입력해주세요.');    return null; }

  return { name, bank, bankIcon, balance, rate, startDate:start, endDate:end, interestDay:intDay, loanType, repayMethod };
}

renderPage();
</script>
</body>
</html>

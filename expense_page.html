<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>지출 - AssetFlow</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#1a1a1a; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif; min-height:100vh; padding-bottom:100px; }
  .header { display:flex; align-items:center; padding:16px 20px; position:sticky; top:0; background:#1a1a1a; z-index:100; }
  .back-btn { background:none; border:none; color:#fff; font-size:22px; cursor:pointer; padding:4px 8px 4px 0; line-height:1; }
  .header-title { font-size:17px; font-weight:600; margin-left:4px; }

  /* 탭 */
  .main-tabs { display:flex; margin:0 20px 20px; background:#242424; border-radius:12px; padding:4px; }
  .main-tab { flex:1; background:none; border:none; color:#888; font-size:14px; font-weight:500; padding:10px; cursor:pointer; border-radius:9px; transition:all 0.2s; }
  .main-tab.active { background:#2e2e2e; color:#fff; font-weight:600; }

  /* 총액 카드 */
  .total-card { margin:0 20px 20px; background:#242424; border-radius:16px; padding:18px 20px; }
  .tc-label  { font-size:13px; color:#888; margin-bottom:6px; }
  .tc-amount { font-size:26px; font-weight:700; color:#f87171; letter-spacing:-0.5px; }
  .tc-sub    { font-size:13px; color:#666; margin-top:4px; }

  /* 환산 안내 카드 */
  .convert-card { margin:0 20px 20px; background:#242424; border-radius:14px; padding:14px 16px; display:flex; justify-content:space-between; align-items:center; }
  .cc-left { font-size:13px; color:#888; }
  .cc-right { text-align:right; }
  .cc-amount { font-size:15px; font-weight:600; color:#fb923c; }
  .cc-note   { font-size:11px; color:#555; margin-top:2px; }

  /* 섹션 헤더 */
  .section-header { display:flex; align-items:center; justify-content:space-between; padding:4px 20px 10px; }
  .section-title { font-size:13px; color:#888; font-weight:500; }
  .section-total { font-size:13px; color:#888; }

  /* 지출 항목 */
  .expense-list { padding:0 20px; }
  .expense-item { display:flex; align-items:center; padding:13px 0; border-bottom:1px solid #2a2a2a; }
  .expense-item:last-child { border-bottom:none; }
  .ei-icon  { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; margin-right:12px; }
  .ei-info  { flex:1; min-width:0; }
  .ei-name  { font-size:15px; font-weight:500; color:#eee; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ei-sub   { font-size:12px; color:#666; margin-top:2px; }
  .ei-right { text-align:right; flex-shrink:0; margin-left:8px; }
  .ei-amount{ font-size:15px; font-weight:600; color:#fff; }
  .ei-freq  { font-size:11px; color:#666; margin-top:2px; }

  /* 빈 화면 */
  .empty-state { text-align:center; padding:50px 0; color:#444; }
  .empty-icon  { font-size:40px; margin-bottom:12px; }
  .empty-text  { font-size:14px; line-height:1.6; }

  /* 하단 */
  .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:rgba(26,26,26,0.97); backdrop-filter:blur(10px); padding:12px 20px 28px; }
  .nav-btn { width:100%; background:#2e2e2e; border:none; border-radius:12px; color:#fff; font-size:14px; font-weight:500; padding:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; }

  /* 편집 모달 */
  .edit-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:200; align-items:flex-end; }
  .edit-overlay.active { display:flex; }
  .edit-sheet { background:#242424; border-radius:24px 24px 0 0; width:100%; max-height:92vh; overflow-y:auto; padding:20px 20px 40px; animation:slideUp 0.28s ease; }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-handle { width:36px; height:4px; background:#444; border-radius:2px; margin:0 auto 20px; }
  .modal-title  { font-size:18px; font-weight:700; margin-bottom:24px; }
  .edit-list { display:flex; flex-direction:column; gap:10px; }
  .edit-item { background:#2e2e2e; border-radius:14px; padding:14px 16px; display:flex; align-items:center; gap:12px; }
  .el-icon { width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
  .el-info { flex:1; min-width:0; }
  .el-name { font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .el-sub  { font-size:12px; color:#666; margin-top:2px; }
  .el-actions { display:flex; gap:8px; flex-shrink:0; }
  .btn-ea { background:#3a3a3a; border:none; border-radius:8px; color:#ccc; font-size:12px; padding:6px 10px; cursor:pointer; }
  .btn-ea.del { color:#ff6b6b; }
  .btn-add { margin-top:16px; width:100%; background:#f87171; border:none; border-radius:14px; color:#fff; font-size:15px; font-weight:700; padding:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }
  .edit-cat-label { font-size:12px; color:#555; padding:8px 0 4px; border-top:1px solid #2a2a2a; margin-top:4px; }
  .edit-cat-label:first-child { border-top:none; margin-top:0; }
  .add-form { display:flex; flex-direction:column; gap:14px; }
  .f-label { font-size:13px; color:#888; margin-bottom:4px; }
  .f-input { width:100%; background:#2e2e2e; border:1px solid #3a3a3a; border-radius:10px; color:#fff; font-size:15px; padding:13px 14px; outline:none; -webkit-appearance:none; }
  .f-input:focus { border-color:#f87171; }
  .f-row   { display:flex; flex-direction:column; gap:4px; }
  .f-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .sel-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .sel-grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .type-btn { background:#2e2e2e; border:2px solid transparent; border-radius:10px; color:#aaa; font-size:12px; padding:10px 4px; cursor:pointer; text-align:center; transition:all 0.15s; line-height:1.4; }
  .type-btn.active { border-color:#f87171; color:#f87171; background:rgba(248,113,113,0.08); }
  .fsec { font-size:12px; color:#555; font-weight:600; padding:6px 0 2px; border-top:1px solid #333; margin-top:2px; }
  .fsec:first-child { border-top:none; margin-top:0; }
  .btn-submit { margin-top:8px; width:100%; background:#f87171; border:none; border-radius:14px; color:#fff; font-size:15px; font-weight:700; padding:16px; cursor:pointer; }
  .btn-cancel { width:100%; background:#333; border:none; border-radius:14px; color:#aaa; font-size:15px; padding:14px; cursor:pointer; margin-top:6px; }
</style>
</head>
<body>
<div class="header">
  <button class="back-btn" onclick="location.href='asset_manager_mobile.html'">‹</button>
  <span class="header-title">고정 지출</span>
</div>

<div class="main-tabs">
  <button class="main-tab active" id="tabMonthly" onclick="switchTab('monthly')">매월 고정</button>
  <button class="main-tab" id="tabAnnual"  onclick="switchTab('annual')">연간 비정기</button>
</div>

<div class="total-card">
  <div class="tc-label" id="totalLabel">매월 고정지출 합계</div>
  <div class="tc-amount" id="totalAmount">—</div>
  <div class="tc-sub"   id="totalSub">—</div>
</div>

<div id="convertCard" style="display:none">
  <div class="convert-card">
    <div class="cc-left">연간 비정기 → 월 환산</div>
    <div class="cc-right">
      <div class="cc-amount" id="annualMonthly">—</div>
      <div class="cc-note" id="annualNote">—</div>
    </div>
  </div>
</div>

<div id="mainContent"></div>

<div class="bottom-nav">
  <button class="nav-btn" onclick="openEditModal()">⚙️ 자산 편집하기</button>
</div>

<div class="edit-overlay" id="editOverlay" onclick="if(event.target===this)closeEditModal()">
  <div class="edit-sheet">
    <div class="modal-handle"></div>
    <div id="editContent"></div>
  </div>
</div>

<script>

/* ── 사용자 prefix 시스템 ── */
function getPrefix(){
  return localStorage.getItem('af_active_prefix')||'u1_';
}
function pk(key){ return getPrefix()+key; }
/* ══════════════════════════════════════
   카테고리
══════════════════════════════════════ */
const MONTHLY_CATS = [
  {key:'telecom',  label:'통신·구독',    icon:'📱', bg:'#0ea5e922'},
  {key:'housing',  label:'주거·관리',    icon:'🏠', bg:'#22c55e22'},
  {key:'edu',      label:'교육·자기계발', icon:'🎓', bg:'#a855f722'},
  {key:'health',   label:'건강·피트니스', icon:'🏋️', bg:'#ef444422'},
  {key:'food',     label:'식비·생필품',   icon:'🛒', bg:'#f59e0b22'},
  {key:'transport',label:'교통·차량',     icon:'🚗', bg:'#64748b22'},
  {key:'etc_m',    label:'기타',          icon:'💸', bg:'#2e2e2e'},
];
const ANNUAL_CATS = [
  {key:'tax_prop',  label:'재산세',       icon:'🏠', bg:'#f8717122'},
  {key:'tax_income',label:'종합소득세',   icon:'📋', bg:'#fb923c22'},
  {key:'tax_car',   label:'자동차세',     icon:'🚗', bg:'#fbbf2422'},
  {key:'tax_health',label:'건강보험료',   icon:'🏥', bg:'#22c55e22'},
  {key:'insur',     label:'연간 보험료',  icon:'🛡️', bg:'#4da3ff22'},
  {key:'member',    label:'연회비',       icon:'💳', bg:'#a855f722'},
  {key:'etc_a',     label:'기타 연간',    icon:'📅', bg:'#2e2e2e'},
];
const FREQ_OPTS = [
  {key:'monthly',label:'매월',   times:12},
  {key:'bi2',    label:'격월',   times:6},
  {key:'q',      label:'분기',   times:4},
  {key:'semi',   label:'반기',   times:2},
  {key:'once',   label:'연1회',  times:1},
];

/* ─── 스토리지 ─── */
function loadItems(){ try{const s=localStorage.getItem(pk('af_expense')); return s?JSON.parse(s):DEFAULT_ITEMS;} catch{return DEFAULT_ITEMS;} }
function saveItems(d){ localStorage.setItem(pk('af_expense'),JSON.stringify(d)); }

const DEFAULT_ITEMS = [
  {id:1, type:'monthly', cat:'telecom',  name:'넷플릭스',    amount:17000,  freq:'monthly'},
  {id:2, type:'monthly', cat:'telecom',  name:'통신비',      amount:69000,  freq:'monthly'},
  {id:3, type:'monthly', cat:'housing',  name:'관리비',      amount:180000, freq:'monthly'},
  {id:4, type:'monthly', cat:'health',   name:'헬스장',      amount:88000,  freq:'monthly'},
  {id:5, type:'annual',  cat:'tax_prop', name:'재산세',      amount:1200000,freq:'semi'},
  {id:6, type:'annual',  cat:'tax_car',  name:'자동차세',    amount:260000, freq:'once'},
];

let items=loadItems();
let activeTab='monthly';

/* ─── 포맷 ─── */
function fmt(n){ return Math.round(n).toLocaleString('ko-KR')+'원'; }

function monthlyAmt(item){
  const f=FREQ_OPTS.find(x=>x.key===item.freq)||FREQ_OPTS[0];
  return Math.round(item.amount*f.times/12);
}

/* ─── 렌더 ─── */
function switchTab(tab){
  activeTab=tab;
  document.getElementById('tabMonthly').classList.toggle('active',tab==='monthly');
  document.getElementById('tabAnnual').classList.toggle('active',tab==='annual');
  renderPage();
}

function renderPage(){
  const monthly=items.filter(x=>x.type==='monthly');
  const annual =items.filter(x=>x.type==='annual');
  const monthlyTotal=monthly.reduce((s,x)=>s+x.amount,0);
  const annualMonthly=annual.reduce((s,x)=>s+monthlyAmt(x),0);

  if(activeTab==='monthly'){
    document.getElementById('totalLabel').textContent='매월 고정지출 합계';
    document.getElementById('totalAmount').textContent=fmt(monthlyTotal);
    document.getElementById('totalSub').textContent=`${monthly.length}개 항목`;
    document.getElementById('convertCard').style.display=annual.length?'block':'none';
    document.getElementById('annualMonthly').textContent=`+${fmt(annualMonthly)}/월`;
    document.getElementById('annualNote').textContent=`연간 비정기 ${annual.length}건 월 환산`;

    const cats=MONTHLY_CATS;
    let html='';
    cats.forEach(c=>{
      const list=monthly.filter(x=>x.cat===c.key);
      if(!list.length) return;
      const sub=list.reduce((s,x)=>s+x.amount,0);
      html+=`<div class="section-header"><span class="section-title">${c.icon} ${c.label}</span><span class="section-total">${fmt(sub)}</span></div>`;
      html+=`<div class="expense-list">${list.map(x=>`
        <div class="expense-item">
          <div class="ei-icon" style="background:${c.bg}">${c.icon}</div>
          <div class="ei-info"><div class="ei-name">${x.name}</div><div class="ei-sub">매월</div></div>
          <div class="ei-right"><div class="ei-amount">${fmt(x.amount)}</div><div class="ei-freq">월정액</div></div>
        </div>`).join('')}</div>`;
    });
    document.getElementById('mainContent').innerHTML=html||`<div class="empty-state"><div class="empty-icon">💸</div><div class="empty-text">매월 고정지출이 없어요</div></div>`;

  } else {
    document.getElementById('totalLabel').textContent='연간 비정기 지출 합계';
    document.getElementById('totalAmount').textContent=fmt(annual.reduce((s,x)=>s+x.amount,0));
    document.getElementById('totalSub').textContent=`월 환산 ${fmt(annualMonthly)}/월`;
    document.getElementById('convertCard').style.display='none';

    const cats=ANNUAL_CATS;
    let html='';
    cats.forEach(c=>{
      const list=annual.filter(x=>x.cat===c.key);
      if(!list.length) return;
      const sub=list.reduce((s,x)=>s+x.amount,0);
      html+=`<div class="section-header"><span class="section-title">${c.icon} ${c.label}</span><span class="section-total">${fmt(sub)}</span></div>`;
      html+=`<div class="expense-list">${list.map(x=>{
        const f=FREQ_OPTS.find(o=>o.key===x.freq)||FREQ_OPTS[0];
        return `
          <div class="expense-item">
            <div class="ei-icon" style="background:${c.bg}">${c.icon}</div>
            <div class="ei-info"><div class="ei-name">${x.name}</div><div class="ei-sub">${f.label} · 월 환산 ${fmt(monthlyAmt(x))}</div></div>
            <div class="ei-right"><div class="ei-amount">${fmt(x.amount)}</div><div class="ei-freq">${f.label}</div></div>
          </div>`;
      }).join('')}</div>`;
    });
    document.getElementById('mainContent').innerHTML=html||`<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-text">연간 비정기 지출이 없어요</div></div>`;
  }
}

/* ─── 편집 모달 ─── */
function openEditModal(){ showEditMain(); document.getElementById('editOverlay').classList.add('active'); }
function closeEditModal(){ document.getElementById('editOverlay').classList.remove('active'); }

function showEditMain(){
  const monthly=items.filter(x=>x.type==='monthly');
  const annual =items.filter(x=>x.type==='annual');
  function itemRow(x){
    const cats=[...MONTHLY_CATS,...ANNUAL_CATS];
    const c=cats.find(c=>c.key===x.cat)||{icon:'💸',bg:'#2e2e2e'};
    const f=FREQ_OPTS.find(o=>o.key===x.freq)||FREQ_OPTS[0];
    return `
      <div class="edit-item">
        <div class="el-icon" style="background:${c.bg}">${c.icon}</div>
        <div class="el-info"><div class="el-name">${x.name}</div><div class="el-sub">${fmt(x.amount)} · ${f.label}</div></div>
        <div class="el-actions">
          <button class="btn-ea" onclick="showForm(${x.id})">수정</button>
          <button class="btn-ea del" onclick="deleteItem(${x.id})">삭제</button>
        </div>
      </div>`;
  }
  let listHTML='';
  if(monthly.length){ listHTML+=`<div class="edit-cat-label">매월 고정</div>${monthly.map(itemRow).join('')}`; }
  if(annual.length)  { listHTML+=`<div class="edit-cat-label">연간 비정기</div>${annual.map(itemRow).join('')}`; }
  if(!listHTML) listHTML='<div style="color:#555;font-size:13px;padding:8px 0">등록된 지출이 없어요</div>';
  document.getElementById('editContent').innerHTML=`
    <div class="modal-title">고정 지출 편집</div>
    <div class="edit-list">${listHTML}</div>
    <button class="btn-add" onclick="showForm(null)">＋ 지출 추가하기</button>`;
}

function showForm(id){
  const p=id?items.find(x=>x.id===id):{};
  const isEdit=!!id;
  const curType=p.type||activeTab||'monthly';
  const cats=curType==='monthly'?MONTHLY_CATS:ANNUAL_CATS;
  document.getElementById('editContent').innerHTML=`
    <div class="modal-title">${isEdit?'지출 수정':'지출 추가'}</div>
    <div class="add-form">
      <div class="fsec">지출 유형</div>
      <div class="f-row"><div class="f-label">유형 선택</div>
        <div class="sel-grid-2" id="typeGrid">
          <button class="type-btn ${curType==='monthly'?'active':''}" data-v="monthly" onclick="pickType(this)">매월 고정</button>
          <button class="type-btn ${curType==='annual'?'active':''}"  data-v="annual"  onclick="pickType(this)">연간 비정기</button>
        </div>
      </div>
      <div class="f-row"><div class="f-label">카테고리</div>
        <div class="sel-grid-3" id="catGrid">
          ${cats.map(c=>`<button class="type-btn ${(p.cat||cats[0].key)===c.key?'active':''}" data-v="${c.key}" onclick="pickCat(this)">${c.icon} ${c.label}</button>`).join('')}
        </div>
      </div>
      <div class="fsec">상세 정보</div>
      <div class="f-row"><div class="f-label">항목명</div><input class="f-input" id="fName" type="text" placeholder="예) 넷플릭스" value="${p.name||''}"></div>
      <div class="f-row"><div class="f-label">금액 (원)</div><input class="f-input" id="fAmount" type="number" inputmode="numeric" placeholder="0" value="${p.amount||''}"></div>
      <div class="f-row"><div class="f-label">납부 빈도</div>
        <div class="sel-grid-3" id="freqGrid">
          ${FREQ_OPTS.map(f=>`<button class="type-btn ${(p.freq||'monthly')===f.key?'active':''}" data-v="${f.key}" onclick="pickFreq(this)">${f.label}</button>`).join('')}
        </div>
      </div>
      <button class="btn-submit" onclick="${isEdit?`updateItem(${id})`:'addItem()'}">${isEdit?'저장하기':'추가하기'}</button>
      <button class="btn-cancel" onclick="showEditMain()">취소</button>
    </div>`;
}

function pickType(btn){
  document.querySelectorAll('#typeGrid .type-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
  const t=btn.dataset.v;
  const cats=t==='monthly'?MONTHLY_CATS:ANNUAL_CATS;
  document.getElementById('catGrid').innerHTML=cats.map(c=>`<button class="type-btn" data-v="${c.key}" onclick="pickCat(this)">${c.icon} ${c.label}</button>`).join('');
  document.getElementById('catGrid').firstElementChild?.classList.add('active');
}
function pickCat(btn){ document.querySelectorAll('#catGrid .type-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
function pickFreq(btn){ document.querySelectorAll('#freqGrid .type-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }

function readForm(){
  const name=document.getElementById('fName').value.trim();
  const amount=parseInt(document.getElementById('fAmount').value)||0;
  const type=document.querySelector('#typeGrid .type-btn.active')?.dataset.v||'monthly';
  const cat=document.querySelector('#catGrid .type-btn.active')?.dataset.v||'etc_m';
  const freq=document.querySelector('#freqGrid .type-btn.active')?.dataset.v||'monthly';
  if(!name){alert('항목명을 입력해주세요.');return null;}
  if(!amount){alert('금액을 입력해주세요.');return null;}
  return {name,amount,type,cat,freq};
}
function addItem(){ const d=readForm(); if(!d)return; d.id=Date.now(); items.push(d); saveItems(items); showEditMain(); renderPage(); }
function updateItem(id){ const d=readForm(); if(!d)return; const i=items.findIndex(x=>Number(x.id)===Number(id)); if(i!==-1)items[i]={...items[i],...d}; saveItems(items); showEditMain(); renderPage(); }
function deleteItem(id){ items=items.filter(x=>Number(x.id)!==Number(id)); saveItems(items); showEditMain(); renderPage(); }

renderPage();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AssetFlow</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background:#000; color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    min-height:100vh; padding-bottom:40px;
  }

  /* ── 헤더 ── */
  .header { padding:16px 20px; display:flex; align-items:center; justify-content:space-between; }
  .header-left { display:flex; align-items:center; gap:6px; }
  .user-switch { display:flex; gap:6px; }
  .user-btn {
    background:#2a2a2a; border:2px solid transparent; border-radius:20px;
    color:#888; font-size:13px; font-weight:500; padding:6px 16px;
    cursor:pointer; transition:all 0.15s;
  }
  .user-btn.active { border-color:#007aff; color:#007aff; background:rgba(0,122,255,0.08); }
  .user-btn:active { opacity:0.7; }
  .header-right { display:flex; align-items:center; gap:6px; }
  .header-icon-btn {
    background:#2a2a2a; border:none; border-radius:50%; color:#aaa;
    font-size:16px; padding:8px; cursor:pointer; width:36px; height:36px;
    display:flex; align-items:center; justify-content:center;
  }

  /* ── 순자산 카드 ── */
  .networth-card { margin:0 20px 20px; background:#1a1a1a; border-radius:20px; padding:24px; }
  .nw-amount { font-size:36px; font-weight:700; letter-spacing:-1px; margin-bottom:8px; color:#fff; }
  .nw-change { font-size:13px; display:flex; align-items:center; gap:4px; color:#4ade80; }
  .nw-change.neg { color:#f87171; }
  .nw-change::before { content:'▲'; font-size:12px; margin-right:2px; }
  .nw-change.neg::before { content:'▼'; }

  /* ── 목표 퀵뷰 ── */
  .goal-quick { margin:0 20px 20px; background:#242424; border-radius:16px; padding:18px; }
  .gq-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .gq-title { font-size:14px; font-weight:600; }
  .gq-detail { font-size:12px; color:#007aff; cursor:pointer; }
  .gq-progress-bg { height:8px; background:#2a2a2a; border-radius:4px; overflow:hidden; margin-bottom:10px; }
  .gq-progress-bar { height:100%; background:linear-gradient(90deg, #34d399, #10b981); border-radius:4px; transition:width 0.3s; }
  .gq-info { display:flex; justify-content:space-between; font-size:13px; }
  .gq-current { color:#10b981; font-weight:600; }
  .gq-target { color:#888; }

  /* ── 자산/부채 요약 ── */
  .asset-debt-card { margin:0 20px 20px; background:#242424; border-radius:16px; padding:20px; }
  .ad-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .ad-row:last-child { margin-bottom:0; }
  .ad-label { font-size:13px; color:#888; }
  .ad-amount { font-size:18px; font-weight:600; }

  /* ── 자산 구성 카드 ── */
  .composition-card { margin:0 20px 24px; background:#242424; border-radius:16px; padding:20px; }
  .comp-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .comp-title { font-size:14px; font-weight:600; }
  .comp-toggle { background:#2a2a2a; border:none; border-radius:12px; color:#666; font-size:11px; padding:6px 12px; cursor:pointer; transition:all 0.15s; }
  .comp-toggle.active { background:#333; color:#aaa; }
  .comp-total-label { font-size:13px; color:#888; margin-bottom:6px; }
  .comp-total-amount { font-size:28px; font-weight:700; letter-spacing:-0.5px; margin-bottom:20px; }
  .comp-bar-wrap { margin-bottom:24px; }
  .comp-bar { display:flex; height:20px; border-radius:10px; overflow:hidden; }
  .comp-bar-seg { height:100%; transition:width 0.3s; }
  .comp-list { display:flex; flex-direction:column; gap:16px; }
  .comp-item { display:flex; flex-direction:column; gap:4px; }
  .comp-item-header { display:flex; align-items:center; justify-content:space-between; }
  .comp-item-left { display:flex; align-items:center; gap:8px; }
  .comp-item-bar { width:4px; height:20px; border-radius:2px; }
  .comp-item-name { font-size:14px; font-weight:500; color:#fff; }
  .comp-item-amount { font-size:16px; font-weight:600; color:#fff; }
  .comp-item-footer { display:flex; align-items:center; justify-content:space-between; padding-left:12px; }
  .comp-item-ratio { font-size:13px; color:#888; }
  .comp-item-change { font-size:13px; color:#666; }
  .comp-item-change.pos { color:#4ade80; }
  .comp-item-change.neg { color:#f87171; }

  /* ── 편집 모달 ── */
  .comp-edit-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); z-index:1000; display:none; align-items:flex-end; }
  .comp-edit-overlay.active { display:flex; }
  .comp-edit-sheet { background:#1e1e1e; border-radius:20px 20px 0 0; width:100%; max-height:70vh; overflow-y:auto; padding:20px; }
  .comp-edit-handle { width:40px; height:4px; background:#444; border-radius:2px; margin:0 auto 20px; }
  .comp-edit-title { font-size:16px; font-weight:600; margin-bottom:20px; text-align:center; }
  .comp-edit-list { display:flex; flex-direction:column; gap:12px; margin-bottom:20px; }
  .comp-edit-item { display:flex; align-items:center; justify-content:space-between; padding:14px; background:#242424; border-radius:12px; cursor:pointer; }
  .comp-edit-item-left { display:flex; align-items:center; gap:12px; }
  .comp-edit-item-bar { width:4px; height:24px; border-radius:2px; }
  .comp-edit-item-name { font-size:14px; font-weight:500; }
  .comp-edit-toggle { width:44px; height:24px; background:#3a3a3a; border-radius:12px; position:relative; transition:all 0.15s; cursor:pointer; }
  .comp-edit-toggle.active { background:#007aff; }
  .comp-edit-toggle::after { content:''; position:absolute; top:2px; left:2px; width:20px; height:20px; background:#fff; border-radius:50%; transition:all 0.15s; }
  .comp-edit-toggle.active::after { left:22px; }
  .comp-edit-close { width:100%; background:#333; border:none; border-radius:12px; color:#fff; font-size:15px; padding:14px; cursor:pointer; margin-top:10px; }

  /* ── 자산 그리드 ── */
  .section-title { font-size:15px; font-weight:600; padding:0 20px 12px; }
  .asset-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; padding:0 20px 24px; }
  .asset-card { background:#242424; border-radius:14px; padding:16px; text-align:center; cursor:pointer; transition:all 0.15s; }
  .asset-card:active { opacity:0.7; transform:scale(0.98); }
  .ac-label { font-size:14px; color:#fff; font-weight:500; }

  /* ── 분석 그리드 ── */
  .analysis-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; padding:0 20px 24px; }

  /* ── 요약 카드 ── */
  .summary-card { margin:0 20px 24px; background:#242424; border-radius:16px; padding:18px; }
  .summary-row { display:flex; justify-content:space-between; margin-bottom:10px; }
  .summary-row:last-child { margin-bottom:0; }
  .sm-label { font-size:13px; color:#888; }
  .sm-value { font-size:14px; font-weight:600; }

  /* ── 이름 설정 모달 ── */
  .name-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:2000; display:none; align-items:flex-end; }
  .name-overlay.active { display:flex; }
  .name-sheet { background:#1e1e1e; border-radius:20px 20px 0 0; width:100%; padding:20px; }
  .ns-handle { width:40px; height:4px; background:#444; border-radius:2px; margin:0 auto 20px; }
  .ns-title { font-size:16px; font-weight:600; text-align:center; margin-bottom:20px; }
  .ns-form { display:flex; flex-direction:column; gap:16px; margin-bottom:20px; }
  .ns-label { font-size:13px; color:#888; margin-bottom:6px; }
  .ns-input { width:100%; background:#242424; border:1px solid #333; border-radius:10px; color:#fff; font-size:15px; padding:12px; }
  .ns-input:focus { outline:none; border-color:#007aff; }
  .ns-btn-row { display:flex; gap:10px; }
  .ns-cancel, .ns-save { flex:1; border:none; border-radius:10px; font-size:15px; padding:12px; cursor:pointer; }
  .ns-cancel { background:#333; color:#fff; }
  .ns-save { background:#007aff; color:#fff; }

  /* ── 초기화 모달 ── */
  .reset-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:2000; display:none; align-items:center; justify-content:center; }
  .reset-overlay.active { display:flex; }
  .reset-sheet { background:#1e1e1e; border-radius:20px; width:90%; max-width:400px; padding:30px 24px; }
  .rs-icon { font-size:48px; text-align:center; margin-bottom:16px; }
  .rs-title { font-size:18px; font-weight:600; text-align:center; margin-bottom:12px; }
  .rs-desc { font-size:14px; color:#aaa; text-align:center; line-height:1.6; margin-bottom:24px; }
  .rs-input-wrap { margin-bottom:24px; }
  .rs-input { width:100%; background:#242424; border:1px solid #333; border-radius:10px; color:#fff; font-size:15px; padding:12px; text-align:center; }
  .rs-input:focus { outline:none; border-color:#007aff; }
  .rs-btns { display:flex; gap:10px; }
  .rs-cancel, .rs-confirm { flex:1; border:none; border-radius:10px; font-size:15px; padding:12px; cursor:pointer; }
  .rs-cancel { background:#333; color:#fff; }
  .rs-confirm { background:#f87171; color:#fff; }
  .rs-step2 { display:none; }
</style>
</head>

<script>
/* ════════ 기존 로직 시작 ════════ */
const CY = new Date().getFullYear();
const CM = new Date().getMonth() + 1;

let currentUser = localStorage.getItem('af_current_user') || 'u1';

function safe(k) { try { return JSON.parse(localStorage.getItem(k)) || []; } catch { return []; }}
function safeObj(k) { try { return JSON.parse(localStorage.getItem(k)) || {}; } catch { return {}; }}
function monthKey(y, m) { return `${y}-${String(m).padStart(2, '0')}`; }

function calcAssetsForPrefix(p) {
  const accList = safe(p + 'af_accounts');
  const accHist = safeObj(p + 'af_accounts_history');
  const mk = monthKey(CY, CM);
  const monthHist = accHist[mk] || {};

  let accTotal = 0, accSecur = 0, accPension = 0, crypto = 0;
  accList.forEach(a => {
    const bal = monthHist[a.id] || 0;
    if (a.cat === 'checking' || a.cat === 'saving') accTotal += bal;
    else if (a.cat === 'securities') accSecur += bal;
    else if (a.cat === 'pension') accPension += bal;
    else if (a.cat === 'crypto') crypto += bal;
  });

  const invList = safe(p + 'af_invest');
  const inv = invList.reduce((s, x) => s + (x.balance || 0), 0);
  const invGain = invList.reduce((s, x) => s + (x.gainAmt || 0), 0);

  const loans = safe(p + 'af_loans');
  const loan = loans.reduce((s, x) => s + (x.balance || 0), 0);

  const ins = safe(p + 'af_ins_meta');
  const insMo = ins.reduce((s, x) => s + (x.isPaid ? 0 : (x.premium || 0)), 0);

  const cars = safe(p + 'af_cars');

  const reList = safe(p + 'af_realestate');
  const reHist = safeObj(p + 'af_re_history');
  const reMk = reHist[mk] || {};
  let reTotal = 0, reRentDebt = 0;
  reList.forEach(r => {
    const price = reMk[r.id] || 0;
    reTotal += price;
    if (r.rentType === 'jeonse') reRentDebt += (r.rentDeposit || 0);
  });

  const total = accTotal + accSecur + accPension + inv + crypto + reTotal;
  const net = total - loan - reRentDebt;

  return {
    accTotal, accSecur, accPension, inv, crypto, reTotal, reRentDebt,
    invGain, loan, insMo, total, net, cars
  };
}

// 전월 데이터 계산 함수
function calcPrevAssetsForPrefix(p) {
  const prevY = CM === 1 ? CY - 1 : CY;
  const prevM = CM === 1 ? 12 : CM - 1;
  const prevMk = monthKey(prevY, prevM);

  const accList = safe(p + 'af_accounts');
  const accHist = safeObj(p + 'af_accounts_history');
  const prevMonthHist = accHist[prevMk] || {};

  let accTotal = 0, accSecur = 0, accPension = 0, crypto = 0;
  accList.forEach(a => {
    const bal = prevMonthHist[a.id] || 0;
    if (a.cat === 'checking' || a.cat === 'saving') accTotal += bal;
    else if (a.cat === 'securities') accSecur += bal;
    else if (a.cat === 'pension') accPension += bal;
    else if (a.cat === 'crypto') crypto += bal;
  });

  const invList = safe(p + 'af_invest');
  const inv = invList.reduce((s, x) => s + (x.balance || 0), 0);

  const cars = safe(p + 'af_cars');

  const reList = safe(p + 'af_realestate');
  const reHist = safeObj(p + 'af_re_history');
  const prevReMk = reHist[prevMk] || {};
  let reTotal = 0;
  reList.forEach(r => {
    const price = prevReMk[r.id] || 0;
    reTotal += price;
  });

  return {
    accTotal, accSecur, accPension, inv, crypto, reTotal, cars
  };
}

function calcIncomeForPrefix(p) {
  const meta = safe(p + 'af_inc_meta');
  const spend = safeObj(p + 'af_inc_spend');
  const ms = spend[monthKey(CY, CM)] || {};
  return meta.reduce((s, it) => s + (ms[it.id] != null ? ms[it.id] : (it.amount || 0)), 0);
}

function calcExpenseForPrefix(p) {
  const FREQ = { monthly: 12, bi2: 6, q: 4, semi: 2, once: 1 };
  return safe(p + 'af_expense').reduce((s, x) => {
    const t = FREQ[x.freq] || 12;
    return s + (x.type === 'monthly' ? x.amount : Math.round((x.amount || 0) * t / 12));
  }, 0);
}

function getAggregated() {
  if (currentUser === 'all') {
    const a1 = calcAssetsForPrefix('u1_'), a2 = calcAssetsForPrefix('u2_');
    const i1 = calcIncomeForPrefix('u1_'), i2 = calcIncomeForPrefix('u2_');
    const e1 = calcExpenseForPrefix('u1_'), e2 = calcExpenseForPrefix('u2_');
    return {
      accTotal: a1.accTotal + a2.accTotal,
      accSecur: a1.accSecur + a2.accSecur,
      accPension: a1.accPension + a2.accPension,
      inv: a1.inv + a2.inv,
      crypto: a1.crypto + a2.crypto,
      reTotal: a1.reTotal + a2.reTotal,
      reRentDebt: a1.reRentDebt + a2.reRentDebt,
      invGain: a1.invGain + a2.invGain,
      loan: a1.loan + a2.loan,
      insMo: a1.insMo + a2.insMo,
      total: a1.total + a2.total,
      net: a1.net + a2.net,
      cars: a1.cars,
      income: i1 + i2,
      expense: e1 + a1.insMo + e2 + a2.insMo,
      isAll: true
    };
  } else {
    const p = currentUser + '_';
    const a = calcAssetsForPrefix(p);
    const income = calcIncomeForPrefix(p);
    const expense = calcExpenseForPrefix(p) + a.insMo;
    return {
      accTotal: a.accTotal, accSecur: a.accSecur, accPension: a.accPension,
      inv: a.inv, crypto: a.crypto, reTotal: a.reTotal, reRentDebt: a.reRentDebt,
      invGain: a.invGain, loan: a.loan, insMo: a.insMo,
      total: a.total, net: a.net, cars: a.cars,
      income, expense, isAll: false
    };
  }
}

function fmt(n) { return Math.round(Math.abs(n)).toLocaleString('ko-KR') + '원'; }
function fmtShort(n) {
  const abs = Math.abs(Math.round(n)), sign = n < 0 ? '-' : '';
  if (abs >= 100000000) {
    const uk = Math.floor(abs / 100000000), man = Math.floor((abs % 100000000) / 10000);
    return sign + (man > 0 ? `${uk}.${man}억` : `${uk}억`);
  }
  if (abs >= 10000) return sign + Math.floor(abs / 10000) + '만';
  return sign + abs + '원';
}

/* ════════ 자산 구성 편집 ════════ */
let visibleCategories = {
  checking: true,
  investment: true,
  realestate: true,
  car: true,
  crypto: true
};

function loadVisibleCategories() {
  const saved = localStorage.getItem('af_comp_visible');
  if (saved) {
    visibleCategories = JSON.parse(saved);
  }
}

function saveVisibleCategories() {
  localStorage.setItem('af_comp_visible', JSON.stringify(visibleCategories));
}

function openCompEdit() {
  Object.keys(visibleCategories).forEach(cat => {
    const toggle = document.getElementById(`toggle-${cat}`);
    if (toggle) {
      if (visibleCategories[cat]) {
        toggle.classList.add('active');
      } else {
        toggle.classList.remove('active');
      }
    }
  });
  document.getElementById('compEditOverlay').classList.add('active');
}

function closeCompEdit() {
  document.getElementById('compEditOverlay').classList.remove('active');
  saveVisibleCategories();
  render();
}

function toggleCategory(category) {
  visibleCategories[category] = !visibleCategories[category];
  const toggle = document.getElementById(`toggle-${category}`);
  if (toggle) {
    toggle.classList.toggle('active');
  }
}

/* ════════ 렌더링 ════════ */
function render() {
  const D = getAggregated();
  const { accTotal, accSecur, accPension, inv, crypto, reTotal, reRentDebt,
    invGain, loan, insMo, total, net, cars, income, expense } = D;

  // 전월 데이터 계산
  let prevData = { accTotal: 0, accSecur: 0, accPension: 0, inv: 0, crypto: 0, reTotal: 0, cars: [] };
  if (currentUser === 'all') {
    const p1 = calcPrevAssetsForPrefix('u1_');
    const p2 = calcPrevAssetsForPrefix('u2_');
    prevData = {
      accTotal: p1.accTotal + p2.accTotal,
      accSecur: p1.accSecur + p2.accSecur,
      accPension: p1.accPension + p2.accPension,
      inv: p1.inv + p2.inv,
      crypto: p1.crypto + p2.crypto,
      reTotal: p1.reTotal + p2.reTotal,
      cars: p1.cars
    };
  } else {
    prevData = calcPrevAssetsForPrefix(currentUser + '_');
  }

  // 순자산 카드
  document.getElementById('networthAmount').textContent = fmt(net);
  const changeEl = document.getElementById('networthChange');
  const changeText = `전월 대비 ${invGain >= 0 ? '+' : ''}${fmt(Math.abs(invGain))}`;
  changeEl.textContent = changeText;
  changeEl.className = 'nw-change ' + (invGain >= 0 ? '' : 'neg');

  // 자산/부채 요약
  document.getElementById('totalAssetAmount').textContent = fmt(total);
  document.getElementById('totalDebtAmount').textContent = fmt(loan + reRentDebt);

  // 자산 구성
  document.getElementById('compTotalAmount').textContent = fmt(total);

  // 전월 대비 변동값 계산
  const checkingChange = accTotal - prevData.accTotal;
  const investmentChange = (inv + accSecur + accPension) - (prevData.inv + prevData.accSecur + prevData.accPension);
  const realestateChange = reTotal - prevData.reTotal;
  const carVal = cars.reduce((s, c) => s + (c.purchasePrice || 0), 0);
  const prevCarVal = prevData.cars.reduce((s, c) => s + (c.purchasePrice || 0), 0);
  const carChange = carVal - prevCarVal;
  const cryptoChange = crypto - prevData.crypto;

  const categories = [
    { key: 'checking', name: '입출금', color: '#4f8ef7', amount: accTotal, change: checkingChange },
    { key: 'investment', name: '투자', color: '#10b981', amount: inv + accSecur + accPension, change: investmentChange },
    { key: 'realestate', name: '부동산', color: '#f59e0b', amount: reTotal, change: realestateChange },
    { key: 'car', name: '자동차', color: '#6366f1', amount: carVal, change: carChange },
    { key: 'crypto', name: '가상화폐', color: '#f7931a', amount: crypto, change: cryptoChange }
  ].filter(c => visibleCategories[c.key] && c.amount > 0);

  const visibleTotal = categories.reduce((s, c) => s + c.amount, 0);

  // 막대 그래프
  const barHTML = categories.map(c => {
    const pct = visibleTotal > 0 ? (c.amount / visibleTotal * 100).toFixed(1) : 0;
    return `<div class="comp-bar-seg" style="width:${pct}%;background:${c.color}"></div>`;
  }).join('');
  document.getElementById('compBar').innerHTML = barHTML;

  // 리스트
  const listHTML = categories.map(c => {
    const pct = visibleTotal > 0 ? Math.round(c.amount / visibleTotal * 100) : 0;
    const changeClass = c.change > 0 ? 'pos' : (c.change < 0 ? 'neg' : '');
    const changeText = c.change !== 0 ? `${c.change >= 0 ? '+' : ''}${fmt(Math.abs(c.change))}` : '변동 없음';

    return `
      <div class="comp-item" data-category="${c.key}">
        <div class="comp-item-header">
          <div class="comp-item-left">
            <div class="comp-item-bar" style="background:${c.color}"></div>
            <div class="comp-item-name">${c.name}</div>
          </div>
          <div class="comp-item-amount">${fmt(c.amount)}</div>
        </div>
        <div class="comp-item-footer">
          <div class="comp-item-ratio">${pct}%</div>
          <div class="comp-item-change ${changeClass}">${changeText}</div>
        </div>
      </div>`;
  }).join('');
  document.getElementById('compList').innerHTML = listHTML;

  // 요약
  const saving = income - expense;
  document.getElementById('summaryIncome').textContent = income > 0 ? fmtShort(income) : '미입력';
  document.getElementById('summaryExpense').textContent = expense > 0 ? fmtShort(expense) : '미입력';
  document.getElementById('summarySaving').textContent = income > 0 ? fmtShort(saving) : '—';
}

function switchUser(user) {
  currentUser = user;
  localStorage.setItem('af_current_user', user);
  
  // 버튼 활성화
  document.getElementById('btnU1').classList.toggle('active', user === 'u1');
  document.getElementById('btnU2').classList.toggle('active', user === 'u2');
  document.getElementById('btnAll').classList.toggle('active', user === 'all');
  
  // 이름 업데이트
  const n1 = localStorage.getItem('af_name_u1') || '사용자1';
  const n2 = localStorage.getItem('af_name_u2') || '사용자2';
  document.getElementById('btnU1').textContent = n1;
  document.getElementById('btnU2').textContent = n2;
  
  render();
}

function goGrid(page) {
  const prefix = currentUser === 'all' ? 'u1_' : currentUser + '_';
  localStorage.setItem('af_active_prefix', prefix);
  location.href = page;
}

/* ════════ 이름 설정 ════════ */
function openNameModal() {
  document.getElementById('nsInput1').value = localStorage.getItem('af_name_u1') || '';
  document.getElementById('nsInput2').value = localStorage.getItem('af_name_u2') || '';
  document.getElementById('nameOverlay').classList.add('active');
}

function closeNameModal() {
  document.getElementById('nameOverlay').classList.remove('active');
}

function saveNames() {
  const n1 = document.getElementById('nsInput1').value.trim() || '사용자1';
  const n2 = document.getElementById('nsInput2').value.trim() || '사용자2';
  localStorage.setItem('af_name_u1', n1);
  localStorage.setItem('af_name_u2', n2);
  closeNameModal();
  switchUser(currentUser);
}

/* ════════ 초기화 ════════ */
const RESET_KEYS = [
  'af_accounts', 'af_accounts_history', 'af_accounts_cashflow',
  'af_invest', 'af_invest_visibility', 'af_loans',
  'af_cards_meta', 'af_cards_spend',
  'af_ins_meta', 'af_expense',
  'af_inc_meta', 'af_inc_spend',
  'af_cars', 'af_dividends',
  'af_realestate', 'af_re_history',
];

function openResetModal() {
  const names = { u1: localStorage.getItem('af_name_u1') || '사용자1',
                  u2: localStorage.getItem('af_name_u2') || '사용자2',
                  all: '전체' };
  document.getElementById('rsTargetName').textContent = names[currentUser];
  document.getElementById('rsStep1').style.display = 'block';
  document.getElementById('rsStep2').style.display = 'none';
  document.getElementById('resetOverlay').classList.add('active');
}

function closeResetModal() {
  document.getElementById('resetOverlay').classList.remove('active');
  document.getElementById('rsConfirmInput').value = '';
}

function goStep2() {
  document.getElementById('rsStep1').style.display = 'none';
  document.getElementById('rsStep2').style.display = 'block';
}

function backStep1() {
  document.getElementById('rsStep1').style.display = 'block';
  document.getElementById('rsStep2').style.display = 'none';
  document.getElementById('rsConfirmInput').value = '';
}

function checkResetInput() {
  const val = document.getElementById('rsConfirmInput').value.trim();
  const btn = document.getElementById('rsFinalBtn');
  if (val === '삭제') {
    btn.disabled = false;
    btn.style.opacity = '1';
  } else {
    btn.disabled = true;
    btn.style.opacity = '0.4';
  }
}

function executeReset() {
  const prefixes = currentUser === 'all' ? ['u1_', 'u2_'] : [currentUser + '_'];
  prefixes.forEach(p => {
    RESET_KEYS.forEach(k => localStorage.removeItem(p + k));
  });
  closeResetModal();
  render();
}

/* ════════ 초기화 ════════ */
loadVisibleCategories();
switchUser(currentUser);
</script>

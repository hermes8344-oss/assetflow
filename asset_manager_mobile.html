<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AssetFlow</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background:#111; color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    min-height:100vh; padding-bottom:40px;
  }

  /* ── 사용자 선택 바 ── */
  .user-bar {
    display:flex; gap:8px; padding:8px 20px 12px;
    overflow-x:auto; scrollbar-width:none;
  }
  .user-bar::-webkit-scrollbar { display:none; }
  .user-btn {
    display:flex; align-items:center; gap:7px;
    background:#1a1a1a; border:2px solid transparent;
    border-radius:20px; color:#888; font-size:13px; font-weight:500;
    padding:7px 14px; cursor:pointer; white-space:nowrap; flex-shrink:0;
    transition:all 0.18s;
  }
  .user-btn:active { opacity:0.7; }
  .user-btn.u1.active  { border-color:#4da3ff; color:#4da3ff; background:rgba(77,163,255,0.1); }
  .user-btn.u2.active  { border-color:#f472b6; color:#f472b6; background:rgba(244,114,182,0.1); }
  .user-btn.all.active { border-color:#4ade80; color:#4ade80; background:rgba(74,222,128,0.1); }

  /* 사용자 이름 편집 힌트 */
  .user-edit-hint { font-size:11px; color:#444; padding:0 20px 8px; }

  /* ── 총자산 ── */
  .asset-header { padding:4px 20px 16px; }
  .ah-label {
    font-size:13px; color:#888; margin-bottom:8px;
    display:flex; align-items:center; gap:6px;
  }
  .ah-dot   { width:7px; height:7px; border-radius:50%; }
  .ah-dot.u1  { background:#4da3ff; }
  .ah-dot.u2  { background:#f472b6; }
  .ah-dot.all { background:#4ade80; }
  .ah-amount {
    font-size:36px; font-weight:700; letter-spacing:-1px; line-height:1.1;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .ah-change { font-size:14px; margin-top:6px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  .ah-change-val { font-weight:600; }
  .ah-change-val.pos { color:#4ade80; }
  .ah-change-val.neg { color:#f87171; }
  .ah-change-sub { font-size:13px; color:#555; }

  /* ── 도넛 카드 ── */
  .donut-card { margin:0 16px 16px; background:#1a1a1a; border-radius:20px; padding:20px; }
  .donut-wrap { display:flex; align-items:center; gap:18px; }
  .donut-canvas-wrap { position:relative; width:140px; height:140px; flex-shrink:0; }
  .donut-center {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    pointer-events:none;
  }
  .dc-label  { font-size:10px; color:#666; margin-bottom:3px; }
  .dc-amount { font-size:13px; font-weight:700; }
  .dc-amount.pos { color:#4ade80; }
  .dc-amount.neg { color:#f87171; }
  .donut-legend { flex:1; display:flex; flex-direction:column; gap:10px; }
  .dl-item  { display:flex; align-items:center; justify-content:space-between; }
  .dl-left  { display:flex; align-items:center; gap:7px; }
  .dl-dot   { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .dl-name  { font-size:12px; color:#aaa; }
  .dl-amt   { font-size:13px; font-weight:600; color:#fff; }
  .dl-amt.neg { color:#f87171; }

  /* ── 섹션 헤더 ── */
  .section-hd { display:flex; justify-content:space-between; align-items:center; padding:4px 20px 10px; }
  .sh-title { font-size:15px; font-weight:700; }

  /* ── 그리드 ── */
  .asset-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:0 16px 16px; }
  .grid-item {
    background:#1a1a1a; border-radius:14px; padding:14px 10px;
    text-align:center; cursor:pointer; transition:opacity 0.15s;
  }
  .grid-item:active { opacity:0.6; }
  .gi-label { font-size:11px; color:#666; margin-bottom:4px; }
  .gi-value { font-size:12px; font-weight:600; color:#eee; line-height:1.3; }
  .gi-value.red   { color:#f87171; }
  .gi-value.green { color:#4ade80; }

  /* ── 구분선 ── */
  .sep { height:1px; background:#222; margin:0 16px 16px; }

  /* ── 수입/지출 ── */
  .inout-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:0 16px 16px; }
  .inout-card { background:#1a1a1a; border-radius:14px; padding:16px; }
  .ic-label  { font-size:12px; color:#888; margin-bottom:8px; display:flex; align-items:center; gap:5px; }
  .ic-dot    { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .ic-amount { font-size:20px; font-weight:700; }
  .ic-sub    { font-size:11px; color:#555; margin-top:4px; }

  /* ── 저축 ── */
  .saving-card {
    margin:0 16px 16px; background:#1a1a1a; border-radius:14px; padding:14px 16px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .sc-left   { font-size:13px; color:#888; }
  .sc-right  { text-align:right; }
  .sc-amount { font-size:16px; font-weight:700; color:#4da3ff; }
  .sc-rate   { font-size:12px; color:#555; margin-top:2px; }

  /* ── 분석 ── */
  .analysis-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin:0 16px 16px; }

  /* ── 사용자 이름 설정 모달 ── */
  .name-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:200; align-items:flex-end; }
  .name-overlay.active { display:flex; }
  .name-sheet { background:#1e1e1e; border-radius:24px 24px 0 0; width:100%; padding:20px 20px 40px; animation:slideUp 0.25s ease; transition:transform 0.2s ease; }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .ns-handle { width:36px; height:4px; background:#444; border-radius:2px; margin:0 auto 20px; cursor:grab; }
  .ns-handle:active { cursor:grabbing; }
  .ns-title  { font-size:17px; font-weight:700; margin-bottom:20px; }
  .ns-form   { display:flex; flex-direction:column; gap:12px; }
  .ns-label  { font-size:13px; color:#888; margin-bottom:4px; }
  .ns-input  {
    width:100%; background:#2a2a2a; border:1px solid #333;
    border-radius:10px; color:#fff; font-size:15px;
    padding:13px 14px; outline:none;
  }
  .ns-input:focus { border-color:#007aff; }
  .ns-btn-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:4px; }
  .ns-save   { background:#007aff; border:none; border-radius:12px; color:#fff; font-size:15px; font-weight:600; padding:14px; cursor:pointer; }
  .ns-cancel { background:#2a2a2a; border:none; border-radius:12px; color:#aaa; font-size:15px; padding:14px; cursor:pointer; }

  /* ── 초기화 모달 ── */
  .reset-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:400; align-items:center; justify-content:center; padding:0 24px; }
  .reset-overlay.active { display:flex; }
  .reset-sheet {
    background:#1e1e1e; border-radius:20px; width:100%; max-width:340px;
    padding:28px 24px 20px; animation:popIn 0.2s ease;
  }
  @keyframes popIn { from{transform:scale(0.92);opacity:0} to{transform:scale(1);opacity:1} }
  .rs-icon   { font-size:36px; text-align:center; margin-bottom:14px; }
  .rs-title  { font-size:18px; font-weight:700; text-align:center; margin-bottom:8px; }
  .rs-desc   { font-size:14px; color:#888; text-align:center; line-height:1.6; margin-bottom:20px; }
  .rs-desc strong { color:#f87171; }
  .rs-btns   { display:flex; flex-direction:column; gap:8px; }
  .rs-cancel { background:#2a2a2a; border:none; border-radius:12px; color:#aaa; font-size:15px; padding:14px; cursor:pointer; width:100%; }
  .rs-confirm { background:#f8717122; border:2px solid #f87171; border-radius:12px; color:#f87171; font-size:15px; font-weight:700; padding:14px; cursor:pointer; width:100%; }
  /* 2단계 확인 입력 */
  .rs-step2 { display:none; }
  .rs-step2.active { display:block; }
  .rs-step1 { display:block; }
  .rs-step1.hidden { display:none; }
  .rs-input-wrap { margin-bottom:16px; }
  .rs-input-label { font-size:13px; color:#888; margin-bottom:8px; text-align:center; }
  .rs-input { width:100%; background:#2a2a2a; border:2px solid #f87171; border-radius:10px; color:#f87171; font-size:16px; font-weight:700; padding:12px; text-align:center; outline:none; letter-spacing:2px; }

</style>
</head>
<body>



<!-- 사용자 선택 바 -->
<div class="user-bar">
  <button class="user-btn u1 active" id="btn-u1" onclick="switchUser('u1')">
        <span id="name-u1">사용자1</span>
  </button>
  <button class="user-btn u2" id="btn-u2" onclick="switchUser('u2')">
        <span id="name-u2">사용자2</span>
  </button>
  <button class="user-btn all" id="btn-all" onclick="switchUser('all')">
<span>통합</span>
  </button>
  <button class="user-btn" onclick="openNameModal()" style="border-color:#333;color:#555;padding:7px 12px">✏️</button>
  <button class="user-btn" onclick="openResetModal()" style="border-color:#f8717133;color:#f87171;padding:7px 12px">🗑️</button>
</div>

<!-- 총자산 -->
<div class="asset-header">
  <div class="ah-label">
    <div class="ah-dot" id="ahDot"></div>
    <span id="ahLabelText">총 자산</span>
  </div>
  <div class="ah-amount" id="totalAsset">—</div>
  <div class="ah-change">
    <span class="ah-change-val" id="changeVal">—</span>
    <span class="ah-change-sub" id="changeSub">투자수익 기준</span>
  </div>
</div>

<!-- 도넛 -->
<div class="donut-card">
  <div class="donut-wrap">
    <div class="donut-canvas-wrap">
      <canvas id="donutChart" width="140" height="140"></canvas>
      <div class="donut-center">
        <div class="dc-label">순자산</div>
        <div class="dc-amount" id="netAmountCenter">—</div>
      </div>
    </div>
    <div class="donut-legend" id="donutLegend"></div>
  </div>
</div>

<!-- 내 자산 -->
<div class="section-hd"><span class="sh-title" id="assetGridTitle">내 자산</span></div>
<div class="asset-grid" id="assetGrid"></div>
<div class="sep"></div>

<!-- 이번 달 -->
<div class="section-hd"><span class="sh-title">이번 달</span></div>
<div class="inout-grid">
  <div class="inout-card">
    <div class="ic-label"><div class="ic-dot" style="background:#4ade80"></div>수입</div>
    <div class="ic-amount" style="color:#4ade80" id="incomeAmt">—</div>
    <div class="ic-sub" id="incomeSub">—</div>
  </div>
  <div class="inout-card">
    <div class="ic-label"><div class="ic-dot" style="background:#f87171"></div>고정지출</div>
    <div class="ic-amount" style="color:#f87171" id="expenseAmt">—</div>
    <div class="ic-sub" id="expenseSub">—</div>
  </div>
</div>
<div class="saving-card">
  <span class="sc-left">예상 저축</span>
  <div class="sc-right">
    <div class="sc-amount" id="savingAmt">—</div>
    <div class="sc-rate"   id="savingRate">—</div>
  </div>
</div>
<div class="sep"></div>

<!-- 분석 -->
<div class="section-hd"><span class="sh-title">분석</span></div>
<div class="analysis-grid" id="analysisGrid"></div>

<!-- 이름 설정 모달 -->
<div class="name-overlay" id="nameOverlay" onclick="if(event.target===this)closeNameModal()">
  <div class="name-sheet">
    <div class="ns-handle"></div>
    <div class="ns-title">사용자 이름 설정</div>
    <div class="ns-form">
      <div>
        <div class="ns-label">사용자1 이름</div>
        <input class="ns-input" id="nsInput1" type="text" placeholder="예) 동현" maxlength="6">
      </div>
      <div>
        <div class="ns-label">사용자2 이름</div>
        <input class="ns-input" id="nsInput2" type="text" placeholder="예) 배우자" maxlength="6">
      </div>
    </div>
    <div class="ns-btn-row">
      <button class="ns-cancel" onclick="closeNameModal()">취소</button>
      <button class="ns-save"   onclick="saveNames()">저장</button>
    </div>
  </div>
</div>

<!-- 초기화 모달 -->
<div class="reset-overlay" id="resetOverlay" onclick="if(event.target===this)closeResetModal()">
  <div class="reset-sheet">
    <div class="rs-icon">🗑️</div>

    <!-- 1단계 -->
    <div id="rsStep1" class="rs-step1">
      <div class="rs-title">데이터 초기화</div>
      <div class="rs-desc">
        <strong id="rsTargetName">—</strong>의 모든 데이터가<br>
        <strong>완전히 삭제</strong>돼요.<br>
        삭제 후 복구가 불가능해요.
      </div>
      <div class="rs-btns">
        <button class="rs-cancel" onclick="closeResetModal()">취소</button>
        <button class="rs-confirm" onclick="goStep2()">계속 진행하기</button>
      </div>
    </div>

    <!-- 2단계 -->
    <div id="rsStep2" class="rs-step2">
      <div class="rs-title">정말 삭제할까요?</div>
      <div class="rs-desc">확인을 위해 아래에 <strong>"삭제"</strong>를 입력해주세요</div>
      <div class="rs-input-wrap">
        <input class="rs-input" id="rsConfirmInput" type="text" placeholder="삭제" oninput="checkResetInput()">
      </div>
      <div class="rs-btns">
        <button class="rs-cancel" onclick="backStep1()">뒤로</button>
        <button class="rs-confirm" id="rsFinalBtn" onclick="executeReset()" disabled style="opacity:0.4">초기화 실행</button>
      </div>
    </div>
  </div>
</div>


<script>
/* ══════════════════════════════════════
   사용자 시스템
   currentUser: 'u1' | 'u2' | 'all'
   prefix:       'u1_' | 'u2_'
   통합(all) 시 두 prefix 모두 읽어서 합산
══════════════════════════════════════ */
let currentUser = localStorage.getItem('af_current_user')||'u1';

function getNames(){
  return {
    u1: localStorage.getItem('af_name_u1')||'사용자1',
    u2: localStorage.getItem('af_name_u2')||'사용자2',
  };
}

function applyUserUI(){
  const names = getNames();
  document.getElementById('name-u1').textContent = names.u1;
  document.getElementById('name-u2').textContent = names.u2;

  ['u1','u2','all'].forEach(u=>{
    document.getElementById('btn-'+u).classList.toggle('active', currentUser===u);
  });

  // ah-dot 색상
  const dotEl = document.getElementById('ahDot');
  dotEl.className = 'ah-dot '+(currentUser==='u2'?'u2':currentUser==='all'?'all':'u1');

  // 라벨
  const labelMap = {u1:names.u1+'의 자산', u2:names.u2+'의 자산', all:'통합 자산'};
  document.getElementById('ahLabelText').textContent = labelMap[currentUser];
  document.getElementById('assetGridTitle').textContent = currentUser==='all'?'통합 자산':'내 자산';
}

function switchUser(u){
  currentUser = u;
  localStorage.setItem('af_current_user', u);
  // 그리드들이 읽을 활성 prefix 저장
  if(u!=='all') localStorage.setItem('af_active_prefix', u+'_');
  else           localStorage.setItem('af_active_prefix', 'u1_'); // all일땐 u1 기준(그리드)
  applyUserUI();
  render();
}

/* ══════════════════════════════════════
   데이터 집계 (prefix 기반)
══════════════════════════════════════ */
const NOW=new Date(), CY=NOW.getFullYear(), CM=NOW.getMonth()+1;
function monthKey(y,m){ return `${y}-${String(m).padStart(2,'0')}`; }

function safe(key, fallback=[]){
  try{ return JSON.parse(localStorage.getItem(key)||'null')||fallback; } catch{ return fallback; }
}
function safeObj(key){ try{ return JSON.parse(localStorage.getItem(key)||'null')||{}; } catch{ return {}; } }

function calcAssetsForPrefix(p){
  const accounts = safe(p+'af_accounts');
  const invest   = safe(p+'af_invest');
  const loans    = safe(p+'af_loans');
  const ins      = safe(p+'af_ins_meta');
  const cars     = safe(p+'af_cars');

  // 계좌 월별 히스토리
  const accHist = safeObj(p+'af_accounts_history');
  const mk      = monthKey(CY,CM);
  const monthH  = accHist[mk]||{};

  // 카테고리별 분리 (히스토리 기반)
  const getAcc = (cat) => accounts
    .filter(a=>a.cat===cat)
    .reduce((s,a)=>s+(monthH[a.id]||0),0);

  const accCash     = getAcc('checking');   // 입출금
  const accSavings  = getAcc('savings');    // 저축·파킹
  const accSecur    = getAcc('securities'); // 증권·CMA
  const accPension  = getAcc('pension');    // 연금·IRP

  // 계좌 합계 (입출금+저축만 — 증권/연금은 별도)
  const accTotal = accCash + accSavings;

  // 투자탭 (가상화폐 제외한 순수 투자)
  const inv      = invest.filter(a=>a.cat!=='crypto').reduce((s,a)=>s+(a.balance||0),0);
  const crypto   = invest.filter(a=>a.cat==='crypto').reduce((s,a)=>s+(a.balance||0),0);
  const invGain  = invest.reduce((s,a)=>s+(a.gainAmt||0),0);

  const loan  = loans.reduce((s,l)=>s+(l.balance||0),0);
  const insMo = ins.filter(x=>!x.isPaid).reduce((s,x)=>s+(x.premium||0),0);

  // 부동산 (월별 시세 히스토리)
  const reList = safe(p+'af_realestate');
  const reHist = safeObj(p+'af_re_history');
  const reMH   = reHist[mk]||{};
  const reTotal= reList.reduce((s,re)=>s+(reMH[re.id]||0),0);
  // 전세보증금 부채
  const reRentDebt = reList.filter(re=>re.rentType==='jeon'||re.rentType==='semi')
                           .reduce((s,re)=>s+(re.rentDeposit||0),0);

  // 총자산 = 입출금+저축 + 증권 + 연금 + 투자
  const total = accTotal + accSecur + accPension + inv;
  const net   = total - loan;

  // 총자산 재계산 (부동산 + 가상화폐 포함)
  const totalFull = accTotal + accSecur + accPension + inv + crypto + reTotal;
  const netFull   = totalFull - loan - reRentDebt;

  return {
    accTotal,       // 입출금+저축
    accSecur,       // 증권·CMA
    accPension,     // 연금·IRP
    inv,            // 투자탭 (가상화폐 제외)
    crypto,         // 가상화폐
    reTotal,        // 부동산 시세
    reRentDebt,     // 전세보증금 부채
    invGain,
    loan,
    insMo,
    total:  totalFull,
    net:    netFull,
    cars,
  };
}

function calcIncomeForPrefix(p){
  const meta  = safe(p+'af_inc_meta');
  const spend = safeObj(p+'af_inc_spend');
  const ms    = spend[monthKey(CY,CM)]||{};
  return meta.reduce((s,it)=>s+(ms[it.id]!=null?ms[it.id]:(it.amount||0)),0);
}

function calcExpenseForPrefix(p){
  const FREQ={monthly:12,bi2:6,q:4,semi:2,once:1};
  return safe(p+'af_expense').reduce((s,x)=>{
    const t=FREQ[x.freq]||12;
    return s+(x.type==='monthly'?x.amount:Math.round((x.amount||0)*t/12));
  },0);
}

function calcCardSpendForPrefix(p){
  const meta  = safe(p+'af_cards_meta');
  const spend = safeObj(p+'af_cards_spend');
  const ms    = spend[monthKey(CY,CM)]||{};
  return meta.reduce((s,c)=>s+(ms[c.id]||0),0);
}

function getAggregated(){
  if(currentUser==='all'){
    const a1=calcAssetsForPrefix('u1_'), a2=calcAssetsForPrefix('u2_');
    const i1=calcIncomeForPrefix('u1_'),  i2=calcIncomeForPrefix('u2_');
    const e1=calcExpenseForPrefix('u1_'), e2=calcExpenseForPrefix('u2_');
    const c1=calcCardSpendForPrefix('u1_'), c2=calcCardSpendForPrefix('u2_');
    return {
      accTotal:  a1.accTotal  + a2.accTotal,
      accSecur:  a1.accSecur  + a2.accSecur,
      accPension:a1.accPension+ a2.accPension,
      inv:       a1.inv       + a2.inv,
      crypto:    a1.crypto    + a2.crypto,
      reTotal:   a1.reTotal   + a2.reTotal,
      reRentDebt:a1.reRentDebt+ a2.reRentDebt,
      invGain:   a1.invGain   + a2.invGain,
      loan:      a1.loan      + a2.loan,
      insMo:     a1.insMo     + a2.insMo,
      total:     a1.total     + a2.total,
      net:       a1.net       + a2.net,
      cars:      a1.cars,
      income:    i1+i2,
      expense:   e1+a1.insMo+e2+a2.insMo,
      cardSpend: c1+c2,
      isAll:true
    };
  } else {
    const p=currentUser+'_';
    const a=calcAssetsForPrefix(p);
    const income  = calcIncomeForPrefix(p);
    const expense = calcExpenseForPrefix(p)+a.insMo;
    const cardSpend = calcCardSpendForPrefix(p);
    return {
      accTotal:   a.accTotal,
      accSecur:   a.accSecur,
      accPension: a.accPension,
      inv:        a.inv,
      crypto:     a.crypto,
      reTotal:    a.reTotal,
      reRentDebt: a.reRentDebt,
      invGain:    a.invGain,
      loan:       a.loan,
      insMo:      a.insMo,
      total:      a.total,
      net:        a.net,
      cars:       a.cars,
      income, expense, cardSpend, isAll:false
    };
  }
}

/* 포맷 */
function fmt(n){ return Math.round(Math.abs(n)).toLocaleString('ko-KR')+'원'; }
function fmtShort(n){
  const abs=Math.abs(Math.round(n)), sign=n<0?'-':'';
  if(abs>=100000000){
    const uk=Math.floor(abs/100000000), man=Math.floor((abs%100000000)/10000);
    return man>0?`${sign}${uk}억 ${man}만`:`${sign}${uk}억`;
  }
  if(abs>=10000) return `${sign}${Math.floor(abs/10000)}만`;
  return sign+abs.toLocaleString('ko-KR');
}

/* 그리드 이동 시 prefix 저장 */

/* ══════════════════════════════════════
   데이터 초기화
══════════════════════════════════════ */
const RESET_KEYS = [
  'af_accounts','af_accounts_history',
  'af_invest','af_loans',
  'af_cards_meta','af_cards_spend',
  'af_ins_meta','af_expense',
  'af_inc_meta','af_inc_spend',
  'af_cars','af_dividends',
  'af_realestate','af_re_history',
];

function openResetModal(){
  const names = getNames();
  const label = currentUser==='all'
    ? '통합(전체 사용자)'
    : currentUser==='u1' ? names.u1 : names.u2;
  document.getElementById('rsTargetName').textContent = label;
  document.getElementById('rsConfirmInput').value = '';
  document.getElementById('rsFinalBtn').disabled = true;
  document.getElementById('rsFinalBtn').style.opacity = '0.4';
  // 1단계로 초기화
  document.getElementById('rsStep1').classList.remove('hidden');
  document.getElementById('rsStep1').classList.add('rs-step1');
  document.getElementById('rsStep2').classList.remove('active');
  document.getElementById('resetOverlay').classList.add('active');
}
function closeResetModal(){
  document.getElementById('resetOverlay').classList.remove('active');
}
function goStep2(){
  document.getElementById('rsStep1').classList.add('hidden');
  document.getElementById('rsStep2').classList.add('active');
  setTimeout(()=>document.getElementById('rsConfirmInput').focus(), 100);
}
function backStep1(){
  document.getElementById('rsStep1').classList.remove('hidden');
  document.getElementById('rsStep2').classList.remove('active');
}
function checkResetInput(){
  const val = document.getElementById('rsConfirmInput').value;
  const ok  = val === '삭제';
  document.getElementById('rsFinalBtn').disabled = !ok;
  document.getElementById('rsFinalBtn').style.opacity = ok ? '1' : '0.4';
}
function executeReset(){
  const prefixes = currentUser==='all' ? ['u1_','u2_'] : [currentUser+'_'];
  prefixes.forEach(p=>{
    RESET_KEYS.forEach(key=>{
      localStorage.removeItem(p+key);
    });
    // 정비 데이터 (af_maint_로 시작하는 것)
    Object.keys(localStorage).filter(k=>k.startsWith(p+'af_maint_')).forEach(k=>{
      localStorage.removeItem(k);
    });
  });
  closeResetModal();
  render();
  // 완료 토스트
  showToast(currentUser==='all'?'전체 데이터가 초기화됐어요':'데이터가 초기화됐어요');
}

/* 토스트 메시지 */
function showToast(msg){
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;z-index:999;white-space:nowrap;animation:fadeInOut 2.5s ease forwards';
  document.head.insertAdjacentHTML('beforeend','<style>@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}85%{opacity:1}100%{opacity:0}}</style>');
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2500);
}

/* ── 스와이프로 모달 닫기 ── */
(function(){
  let startY=0, currentY=0, isDragging=false;
  const overlay = document.getElementById('nameOverlay');
  const sheet   = overlay?.querySelector('.name-sheet');
  const handle  = overlay?.querySelector('.ns-handle');
  if(!handle||!sheet||!overlay) return;

  function onStart(e){
    const touch = e.touches?e.touches[0]:e;
    startY = touch.clientY; currentY = startY; isDragging = true;
    sheet.style.transition = 'none';
  }
  function onMove(e){
    if(!isDragging) return;
    const touch = e.touches?e.touches[0]:e;
    currentY = touch.clientY;
    const diff = currentY - startY;
    if(diff>0) sheet.style.transform = `translateY(${diff}px)`;
  }
  function onEnd(){
    if(!isDragging) return;
    isDragging = false;
    sheet.style.transition = 'transform 0.2s ease';
    const diff = currentY - startY;
    if(diff>100){ closeNameModal(); }
    else{ sheet.style.transform = 'translateY(0)'; }
  }

  handle.addEventListener('touchstart', onStart, {passive:true});
  handle.addEventListener('touchmove',  onMove,  {passive:true});
  handle.addEventListener('touchend',   onEnd,   {passive:true});
  handle.addEventListener('mousedown',  onStart);
  document.addEventListener('mousemove', e=>{ if(isDragging) onMove(e); });
  document.addEventListener('mouseup',   onEnd);
})();

applyUserUI();
render();
</script>

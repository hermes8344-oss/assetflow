<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>부동산 - AssetFlow</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#1a1a1a; color:#fff; font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif; min-height:100vh; padding-bottom:100px; }

  .header { display:flex; align-items:center; padding:16px 20px; position:sticky; top:0; background:#1a1a1a; z-index:100; }
  .back-btn { background:none; border:none; color:#fff; font-size:22px; cursor:pointer; padding:4px 8px 4px 0; line-height:1; }
  .header-title { font-size:17px; font-weight:600; margin-left:4px; }

  /* 월 선택 */
  .month-label-btn { background:none; border:none; padding:4px 20px 14px; display:flex; align-items:center; gap:6px; cursor:pointer; width:100%; }
  .month-label-btn .label-text { font-size:15px; font-weight:600; color:#fff; }
  .month-label-btn .label-arrow { font-size:10px; color:#555; }

  /* 총 요약 */
  .summary-card { margin:0 20px 20px; background:#242424; border-radius:16px; padding:20px; }
  .sc-label  { font-size:13px; color:#888; margin-bottom:6px; }
  .sc-amount { font-size:26px; font-weight:700; color:#fff; letter-spacing:-0.5px; }
  .sc-row    { display:flex; gap:16px; margin-top:10px; }
  .sc-item   { flex:1; }
  .sc-item-label { font-size:11px; color:#666; margin-bottom:3px; }
  .sc-item-value { font-size:14px; font-weight:600; }
  .sc-item-value.pos { color:#4ade80; }
  .sc-item-value.neg { color:#f87171; }
  .sc-item-value.blue { color:#4da3ff; }

  /* 부동산 카드 */
  .re-list { padding:0 20px; display:flex; flex-direction:column; gap:16px; }
  .re-card  { background:#242424; border-radius:18px; overflow:hidden; }

  /* 카드 헤더 */
  .re-card-header { padding:18px 18px 14px; border-bottom:1px solid #2e2e2e; }
  .re-header-top  { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:8px; }
  .re-name   { font-size:17px; font-weight:700; color:#fff; }
  .re-detail { font-size:12px; color:#888; margin-top:3px; }
  .re-status-badge {
    font-size:11px; font-weight:600; padding:4px 10px; border-radius:20px; flex-shrink:0;
  }
  .badge-pre  { background:#fb923c22; color:#fb923c; } /* 준공 전 */
  .badge-done { background:#4ade8022; color:#4ade80; } /* 준공 완료 */
  .badge-rent { background:#4da3ff22; color:#4da3ff; } /* 임대 중 */
  .badge-own  { background:#a855f722; color:#a855f7; } /* 자가거주 */

  /* 섹션 */
  .re-section { padding:14px 18px; border-bottom:1px solid #2a2a2a; }
  .re-section:last-child { border-bottom:none; }
  .re-section-title { font-size:11px; color:#555; font-weight:600; letter-spacing:0.5px; margin-bottom:10px; }

  .re-row { display:flex; justify-content:space-between; align-items:center; padding:5px 0; }
  .re-row-label { font-size:13px; color:#888; }
  .re-row-value { font-size:13px; font-weight:500; color:#ccc; }
  .re-row-value.bold { font-size:14px; font-weight:700; color:#fff; }
  .re-row-value.pos  { color:#4ade80; }
  .re-row-value.neg  { color:#f87171; }
  .re-row-value.blue { color:#4da3ff; }
  .re-divider { height:1px; background:#2a2a2a; margin:6px 0; }

  /* 수익률 바 */
  .re-profit-bar { margin-top:10px; }
  .re-bar-labels { display:flex; justify-content:space-between; font-size:11px; color:#666; margin-bottom:5px; }
  .re-bar-track  { height:6px; background:#2e2e2e; border-radius:3px; overflow:hidden; }
  .re-bar-fill   { height:100%; border-radius:3px; }

  /* D-day 뱃지 */
  .dday { font-size:11px; font-weight:600; padding:2px 7px; border-radius:6px; margin-left:6px; }
  .dday.urgent { background:#f8717122; color:#f87171; }
  .dday.warn   { background:#fb923c22; color:#fb923c; }
  .dday.ok     { background:#4ade8022; color:#4ade80; }

  /* 빈 화면 */
  .empty-state { text-align:center; padding:80px 20px; color:#444; }
  .empty-icon  { font-size:48px; margin-bottom:16px; }
  .empty-text  { font-size:15px; line-height:1.7; color:#555; }

  /* 하단 */
  .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:rgba(26,26,26,0.97); backdrop-filter:blur(10px); padding:12px 20px 28px; }
  .nav-btn { width:100%; background:#2e2e2e; border:none; border-radius:12px; color:#fff; font-size:14px; font-weight:500; padding:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; }
  .nav-btn:active { background:#383838; }

  /* 월 선택 시트 */
  .sheet-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:300; align-items:flex-end; }
  .sheet-overlay.active { display:flex; }
  .sheet-inner { background:#242424; border-radius:24px 24px 0 0; width:100%; padding:20px 20px 40px; animation:slideUp 0.25s ease; }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .sheet-handle { width:36px; height:4px; background:#444; border-radius:2px; margin:0 auto 20px; }
  .sheet-title  { font-size:16px; font-weight:700; margin-bottom:20px; }
  .year-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .year-nav { background:#333; border:none; color:#fff; font-size:18px; width:36px; height:36px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .year-nav:disabled { color:#444; cursor:default; }
  .year-lbl { font-size:16px; font-weight:600; }
  .month-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .m-chip { background:#333; border:2px solid transparent; border-radius:10px; color:#aaa; font-size:14px; padding:11px 0; cursor:pointer; text-align:center; transition:all 0.15s; line-height:1.4; }
  .m-chip.sel { border-color:#007aff; color:#007aff; background:rgba(0,122,255,0.1); font-weight:600; }
  .m-chip.future { color:#333; pointer-events:none; }
  .m-dot { font-size:8px; color:#555; margin-top:2px; }

  /* 편집 모달 */
  .edit-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:200; align-items:flex-end; }
  .edit-overlay.active { display:flex; }
  .edit-sheet { background:#242424; border-radius:24px 24px 0 0; width:100%; max-height:92vh; overflow-y:auto; padding:20px 20px 40px; animation:slideUp 0.28s ease; }
  .modal-handle { width:36px; height:4px; background:#444; border-radius:2px; margin:0 auto 20px; }
  .modal-title  { font-size:18px; font-weight:700; margin-bottom:24px; }
  .edit-list { display:flex; flex-direction:column; gap:10px; }
  .edit-item { background:#2e2e2e; border-radius:14px; padding:14px 16px; display:flex; align-items:center; gap:12px; }
  .ei-icon { width:36px; height:36px; border-radius:10px; background:#33333344; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
  .ei-info { flex:1; min-width:0; }
  .ei-name { font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ei-sub  { font-size:12px; color:#666; margin-top:2px; }
  .ei-actions { display:flex; gap:8px; flex-shrink:0; }
  .btn-ea { background:#3a3a3a; border:none; border-radius:8px; color:#ccc; font-size:12px; padding:6px 10px; cursor:pointer; }
  .btn-ea.del { color:#ff6b6b; }
  .btn-add { margin-top:16px; width:100%; background:#007aff; border:none; border-radius:14px; color:#fff; font-size:15px; font-weight:600; padding:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; }

  /* 폼 */
  .add-form { display:flex; flex-direction:column; gap:14px; }
  .f-label  { font-size:13px; color:#888; margin-bottom:4px; }
  .f-input  { width:100%; background:#2e2e2e; border:1px solid #3a3a3a; border-radius:10px; color:#fff; font-size:15px; padding:13px 14px; outline:none; -webkit-appearance:none; }
  .f-input:focus { border-color:#007aff; }
  .f-row   { display:flex; flex-direction:column; gap:4px; }
  .f-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .f-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; }
  .type-btn { background:#2e2e2e; border:2px solid transparent; border-radius:10px; color:#aaa; font-size:13px; padding:10px 4px; cursor:pointer; text-align:center; transition:all 0.15s; line-height:1.4; }
  .type-btn.active { border-color:#007aff; color:#007aff; background:rgba(0,122,255,0.08); }
  .fsec { font-size:12px; color:#555; font-weight:600; letter-spacing:0.5px; padding:6px 0 2px; border-top:1px solid #333; margin-top:2px; }
  .fsec:first-child { border-top:none; margin-top:0; }
  .btn-submit { margin-top:8px; width:100%; background:#007aff; border:none; border-radius:14px; color:#fff; font-size:15px; font-weight:600; padding:16px; cursor:pointer; }
  .btn-cancel { width:100%; background:#333; border:none; border-radius:14px; color:#aaa; font-size:15px; padding:14px; cursor:pointer; margin-top:6px; }

  /* 시세 입력 인라인 */
  .price-input-row { display:flex; gap:8px; align-items:center; margin-top:10px; }
  .price-input { flex:1; background:#2e2e2e; border:1px solid #3a3a3a; border-radius:10px; color:#fff; font-size:15px; padding:10px 12px; outline:none; }
  .price-input:focus { border-color:#007aff; }
  .price-ok { background:#007aff; border:none; border-radius:10px; color:#fff; font-size:13px; font-weight:600; padding:10px 14px; cursor:pointer; }
  .price-cancel { background:#2e2e2e; border:none; border-radius:10px; color:#aaa; font-size:13px; padding:10px 14px; cursor:pointer; }
  .btn-edit-price { background:#2e2e2e; border:none; border-radius:8px; color:#888; font-size:12px; padding:5px 10px; cursor:pointer; }

  .month-trash-btn { background:none; border:none; color:#555; font-size:18px; cursor:pointer; padding:4px 8px; line-height:1; transition:color 0.15s; }
  .month-trash-btn:active { color:#f87171; }
  .trash-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:500; align-items:center; justify-content:center; padding:0 24px; }
  .trash-overlay.active { display:flex; }
  .trash-sheet { background:#1e1e1e; border-radius:20px; width:100%; max-width:340px; padding:28px 24px 20px; animation:popIn 0.2s ease; }
  @keyframes popIn { from{transform:scale(0.92);opacity:0} to{transform:scale(1);opacity:1} }
  .trs-icon  { font-size:34px; text-align:center; margin-bottom:12px; }
  .trs-title { font-size:17px; font-weight:700; text-align:center; margin-bottom:8px; }
  .trs-desc  { font-size:14px; color:#888; text-align:center; line-height:1.6; margin-bottom:20px; }
  .trs-desc strong { color:#f87171; }
  .trs-btns  { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .trs-cancel  { background:#2a2a2a; border:none; border-radius:12px; color:#aaa; font-size:15px; padding:14px; cursor:pointer; }
  .trs-confirm { background:#f8717122; border:2px solid #f87171; border-radius:12px; color:#f87171; font-size:15px; font-weight:700; padding:14px; cursor:pointer; }
</style>
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="location.href='asset_manager_mobile.html'">‹</button>
  <span class="header-title">부동산</span>
</div>

<!-- 월 선택 -->
<div style="display:flex;align-items:center;justify-content:space-between;padding:0 20px 14px">
  <button style="background:none;border:none;display:flex;align-items:center;gap:6px;cursor:pointer" onclick="openMonthSheet()">
    <span id="monthLabelText" style="font-size:15px;font-weight:600;color:#fff">—</span>
    <span style="font-size:10px;color:#555">▼</span>
  </button>
  <button class="month-trash-btn" onclick="openMonthTrash()" title="이 달 시세 초기화">🗑️</button>
</div>

<!-- 총 요약 -->
<div class="summary-card">
  <div class="sc-label" id="summaryLabel">부동산 자산</div>
  <div class="sc-amount" id="summaryAmount">—</div>
  <div class="sc-row">
    <div class="sc-item">
      <div class="sc-item-label">총 시세</div>
      <div class="sc-item-value" id="summaryMarket">—</div>
    </div>
    <div class="sc-item">
      <div class="sc-item-label">평가손익</div>
      <div class="sc-item-value" id="summaryProfit">—</div>
    </div>
    <div class="sc-item">
      <div class="sc-item-label">연결 대출</div>
      <div class="sc-item-value neg" id="summaryLoan">—</div>
    </div>
  </div>
</div>

<!-- 부동산 목록 -->
<div id="reList"></div>

<!-- 하단 -->
<div class="bottom-nav">
  <button class="nav-btn" onclick="openEditModal()">⚙️ 자산 편집하기</button>
</div>

<!-- 월 선택 시트 -->
<div class="sheet-overlay" id="monthSheet" onclick="if(event.target===this)closeMonthSheet()">
  <div class="sheet-inner">
    <div class="sheet-handle"></div>
    <div class="sheet-title">월 선택</div>
    <div class="year-row">
      <button class="year-nav" id="yearPrev" onclick="changeYear(-1)">‹</button>
      <span class="year-lbl" id="sheetYearLbl"></span>
      <button class="year-nav" id="yearNext" onclick="changeYear(1)">›</button>
    </div>
    <div class="month-grid" id="monthGrid"></div>
  </div>
</div>
<!-- 월별 초기화 모달 -->
<div class="trash-overlay" id="trashOverlay" onclick="if(event.target===this)closeTrashModal()">
  <div class="trash-sheet">
    <div class="trs-icon">🗑️</div>
    <div class="trs-title" id="trsTitle">이 달 데이터 초기화</div>
    <div class="trs-desc"  id="trsDesc">—</div>
    <div class="trs-btns">
      <button class="trs-cancel"  onclick="closeTrashModal()">취소</button>
      <button class="trs-confirm" onclick="confirmTrash()">초기화</button>
    </div>
  </div>
</div>

<!-- 편집 모달 -->
<div class="edit-overlay" id="editOverlay" onclick="if(event.target===this)closeEditModal()">
  <div class="edit-sheet">
    <div class="modal-handle"></div>
    <div id="editContent"></div>
  </div>
</div>

<script>
/* ── prefix ── */
function getPrefix(){ return localStorage.getItem('af_active_prefix')||'u1_'; }
function pk(key){ return getPrefix()+key; }

const NOW=new Date(), CY=NOW.getFullYear(), CM=NOW.getMonth()+1;
function monthKey(y,m){ return `${y}-${String(m).padStart(2,'0')}`; }
let selY=CY, selM=CM, sheetY=CY;

/* ══════════════════════════════════════
   데이터 구조
   pk('af_realestate')       : [{id, name, area, dong, type(apt/villa/land),
                                  status(pre/done), 
                                  salePrice, extraCosts:[{label,amount}],
                                  loanId, rentType(none/jeon/monthly/semi),
                                  rentDeposit, rentMonthly, rentStart, rentEnd}]
   pk('af_re_history')       : {"YYYY-MM": {id: 시세}}
══════════════════════════════════════ */

const PROP_TYPES  = [{k:'apt',  l:'아파트'}, {k:'villa', l:'빌라·오피스텔'}, {k:'land', l:'토지·상가'}];
const STATUS_TYPES= [{k:'pre',  l:'준공 전'}, {k:'done', l:'준공 완료'}];
const RENT_TYPES  = [{k:'none', l:'자가거주'}, {k:'jeon', l:'전세'}, {k:'monthly', l:'월세'}, {k:'semi', l:'반전세'}];

function loadRE()   { try{const s=localStorage.getItem(pk('af_realestate')); return s?JSON.parse(s):[];} catch{return [];} }
function saveRE(d)  { localStorage.setItem(pk('af_realestate'),JSON.stringify(d)); }
function loadHist() { try{const s=localStorage.getItem(pk('af_re_history')); return s?JSON.parse(s):{};} catch{return {};} }
function saveHist(d){ localStorage.setItem(pk('af_re_history'),JSON.stringify(d)); }
function loadLoans(){ try{const s=localStorage.getItem(pk('af_loans')); return s?JSON.parse(s):[];} catch{return [];} }

let reList=loadRE(), reHist=loadHist();

/* ── 포맷 ── */
function fmt(n){ return Math.round(Math.abs(n)).toLocaleString('ko-KR')+'원'; }
function fmtS(n){
  const abs=Math.abs(Math.round(n)), sign=n<0?'-':'';
  if(abs>=100000000){ const u=Math.floor(abs/100000000),man=Math.floor((abs%100000000)/10000); return man>0?`${sign}${u}억 ${man}만`:`${sign}${u}억`; }
  if(abs>=10000) return `${sign}${Math.floor(abs/10000)}만`;
  return sign+abs.toLocaleString('ko-KR');
}

function getMarket(id){ const mk=monthKey(selY,selM); return (reHist[mk]||{})[id]||0; }
function getCost(re){ return (re.salePrice||0)+(re.extraCosts||[]).reduce((s,c)=>s+c.amount,0); }
function ddayBadge(ds){
  if(!ds) return '';
  const d=Math.ceil((new Date(ds)-new Date())/(864e5));
  let cls='ok', lbl=`D-${d}`;
  if(d<0){cls='urgent';lbl=`D+${Math.abs(d)}`;}
  else if(d===0){cls='urgent';lbl='D-DAY';}
  else if(d<=60){cls='warn';}
  return `<span class="dday ${cls}">${lbl}</span>`;
}

/* ══════════════════════
   렌더링
══════════════════════ */
let editingPriceId = null;

function renderPage(){
  document.getElementById('monthLabelText').textContent=`${selM}월 시세 기준`;
  const loans = loadLoans();

  let totalMarket=0, totalCost=0, totalLoan=0, totalRentDeposit=0;

  reList.forEach(re=>{
    const market = getMarket(re.id);
    const cost   = getCost(re);
    const loan   = loans.find(l=>l.id===re.loanId);
    const loanBal= loan?loan.balance:0;
    totalMarket += market;
    totalCost   += cost;
    totalLoan   += loanBal;
    if(re.rentType==='jeon') totalRentDeposit += re.rentDeposit||0;
  });

  const totalProfit = totalMarket - totalCost;
  // 실질 자산 = 시세 - 대출 - 전세보증금(돌려줘야할 부채)
  const totalNet = totalMarket - totalLoan - totalRentDeposit;

  document.getElementById('summaryAmount').textContent = fmtS(totalNet)+'원';
  document.getElementById('summaryMarket').textContent = totalMarket>0?fmtS(totalMarket)+'원':'—';
  document.getElementById('summaryProfit').textContent = totalMarket>0?(totalProfit>=0?'+':'')+fmtS(totalProfit)+'원':'—';
  document.getElementById('summaryProfit').className = 'sc-item-value '+(totalProfit>=0?'pos':'neg');
  document.getElementById('summaryLoan').textContent  = totalLoan>0?'-'+fmtS(totalLoan)+'원':'없음';

  if(!reList.length){
    document.getElementById('reList').innerHTML=`
      <div class="empty-state">
        <div class="empty-icon">🏠</div>
        <div class="empty-text">등록된 부동산이 없어요<br><span style="font-size:13px;color:#444">자산 편집하기에서 추가해보세요</span></div>
      </div>`;
    return;
  }

  document.getElementById('reList').innerHTML=`<div class="re-list">${reList.map(re=>reCardHTML(re,loans)).join('')}</div>`;
}

function reCardHTML(re, loans){
  const market  = getMarket(re.id);
  const cost    = getCost(re);
  const profit  = market - cost;
  const profPct = cost>0?(profit/cost*100).toFixed(1):0;
  const loan    = loans.find(l=>l.id===re.loanId);
  const loanBal = loan?loan.balance:0;

  // 전세보증금은 부채
  const rentDep = (re.rentType==='jeon'||re.rentType==='semi')?(re.rentDeposit||0):0;
  const realAsset = market - loanBal - rentDep;

  // 실투자금 = 총취득원가 - 대출
  const realInvest = cost - loanBal;
  const realRoi    = realInvest>0?(profit/realInvest*100).toFixed(1):0;

  // 상태 뱃지
  const statusMap = {pre:'badge-pre', done: re.rentType&&re.rentType!=='none'?'badge-rent':'badge-own'};
  const statusLabel= {pre:'준공 전', done: re.rentType==='none'||!re.rentType?'자가거주':re.rentType==='jeon'?'전세 중':re.rentType==='monthly'?'월세 중':'반전세 중'};
  const badgeCls = re.status==='pre'?'badge-pre': re.rentType&&re.rentType!=='none'?'badge-rent':'badge-own';
  const badgeLabel= statusLabel[re.status]||'—';

  // 시세 입력 영역
  const priceSection = editingPriceId===re.id ? `
    <div class="price-input-row">
      <input class="price-input" id="priceInput_${re.id}" type="number" inputmode="numeric" placeholder="${selM}월 시세 (원)" value="${market||''}">
      <button class="price-ok" onclick="savePrice(${re.id})">저장</button>
      <button class="price-cancel" onclick="cancelPrice()">취소</button>
    </div>` : `
    <div class="re-row">
      <span class="re-row-label">현재 시세</span>
      <div style="display:flex;align-items:center;gap:8px">
        ${market>0?`<span class="re-row-value bold">${fmt(market)}</span>`:`<span class="re-row-value" style="color:#555">미입력</span>`}
        <button class="btn-edit-price" onclick="editPrice(${re.id})">✏️</button>
      </div>
    </div>`;

  // 취득원가 세부
  const costRows = `
    <div class="re-row"><span class="re-row-label">분양가</span><span class="re-row-value">${fmt(re.salePrice||0)}</span></div>
    ${(re.extraCosts||[]).map(c=>`<div class="re-row"><span class="re-row-label">${c.label}</span><span class="re-row-value">${fmt(c.amount)}</span></div>`).join('')}
    <div class="re-divider"></div>
    <div class="re-row"><span class="re-row-label">총 취득원가</span><span class="re-row-value bold">${fmt(cost)}</span></div>`;

  // 수익률 바
  const barPct = Math.min(100, Math.max(0, parseFloat(profPct)));
  const barColor = profit>=0?'#4ade80':'#f87171';
  const profitBar = market>0?`
    <div class="re-profit-bar">
      <div class="re-bar-labels"><span>${profit>=0?'+':''}${fmtS(profit)}원</span><span>${profit>=0?'+':''}${profPct}%</span></div>
      <div class="re-bar-track"><div class="re-bar-fill" style="width:${barPct}%;background:${barColor}"></div></div>
    </div>`:'';

  // 임대 섹션
  let rentSection = '';
  if(re.rentType && re.rentType!=='none'){
    const rentLabel = RENT_TYPES.find(r=>r.k===re.rentType)?.l||'';
    rentSection = `
      <div class="re-section">
        <div class="re-section-title">임대 현황</div>
        <div class="re-row"><span class="re-row-label">임대 유형</span><span class="re-row-value">${rentLabel}</span></div>
        ${re.rentDeposit?`<div class="re-row"><span class="re-row-label">보증금</span><span class="re-row-value">${fmt(re.rentDeposit)}</span></div>`:''}
        ${re.rentMonthly?`<div class="re-row"><span class="re-row-label">월세</span><span class="re-row-value">${fmt(re.rentMonthly)}/월</span></div>`:''}
        ${re.rentStart?`<div class="re-row"><span class="re-row-label">계약 시작</span><span class="re-row-value">${re.rentStart}</span></div>`:''}
        ${re.rentEnd?`<div class="re-row"><span class="re-row-label">계약 만기</span>
          <div style="display:flex;align-items:center">${ddayBadge(re.rentEnd)}<span class="re-row-value" style="margin-left:6px">${re.rentEnd}</span></div>
        </div>`:''}
        ${re.rentType==='jeon'||re.rentType==='semi'?`<div class="re-row"><span class="re-row-label" style="color:#f87171">전세보증금 반환 의무</span><span class="re-row-value neg">-${fmt(re.rentDeposit||0)}</span></div>`:''}
      </div>`;
  }

  return `
    <div class="re-card">
      <div class="re-card-header">
        <div class="re-header-top">
          <div>
            <div class="re-name">${re.name}</div>
            <div class="re-detail">${PROP_TYPES.find(t=>t.k===re.type)?.l||''} · ${re.area||''}㎡${re.dong?' · '+re.dong:''}</div>
          </div>
          <span class="re-status-badge ${badgeCls}">${badgeLabel}</span>
        </div>
      </div>

      <!-- 시세 -->
      <div class="re-section">
        <div class="re-section-title">시세 · 손익</div>
        ${priceSection}
        ${market>0?profitBar:''}
        ${market>0?`<div class="re-row" style="margin-top:8px"><span class="re-row-label">실투자 수익률</span><span class="re-row-value ${parseFloat(realRoi)>=0?'pos':'neg'}">${parseFloat(realRoi)>=0?'+':''}${realRoi}%</span></div>`:''}
      </div>

      <!-- 취득원가 -->
      <div class="re-section">
        <div class="re-section-title">취득 원가</div>
        ${costRows}
      </div>

      <!-- 대출 -->
      <div class="re-section">
        <div class="re-section-title">연결 대출</div>
        ${loan?`
          <div class="re-row"><span class="re-row-label">${loan.name}</span><span class="re-row-value neg">-${fmt(loanBal)}</span></div>
          <div class="re-row"><span class="re-row-label">금리</span><span class="re-row-value">${loan.rate}%</span></div>
          <div class="re-divider"></div>
          <div class="re-row"><span class="re-row-label">실질 자산</span><span class="re-row-value bold ${realAsset>=0?'pos':'neg'}">${fmtS(realAsset)}원</span></div>
        `:`<div style="color:#555;font-size:13px">연결된 대출 없음</div>`}
      </div>

      <!-- 임대 -->
      ${rentSection}
    </div>`;
}

/* ── 시세 인라인 편집 ── */
function editPrice(id){ editingPriceId=id; renderPage(); setTimeout(()=>document.getElementById('priceInput_'+id)?.focus(),50); }
function cancelPrice(){ editingPriceId=null; renderPage(); }
function savePrice(id){
  const val=parseInt(document.getElementById('priceInput_'+id)?.value)||0;
  const mk=monthKey(selY,selM);
  if(!reHist[mk]) reHist[mk]={};
  reHist[mk][id]=val;
  saveHist(reHist);
  editingPriceId=null;
  renderPage();
}

/* ── 월 시트 ── */
function openMonthSheet(){ sheetY=selY; renderSheetGrid(); document.getElementById('monthSheet').classList.add('active'); }
function closeMonthSheet(){ document.getElementById('monthSheet').classList.remove('active'); }
function changeYear(d){ sheetY=Math.min(CY,sheetY+d); renderSheetGrid(); }
function renderSheetGrid(){
  document.getElementById('sheetYearLbl').textContent=sheetY+'년';
  document.getElementById('yearPrev').disabled=(sheetY<=CY-5);
  document.getElementById('yearNext').disabled=(sheetY>=CY);
  document.getElementById('monthGrid').innerHTML=Array.from({length:12},(_,i)=>{
    const m=i+1, future=sheetY===CY&&m>CM, isSel=sheetY===selY&&m===selM;
    const hasDot=reHist[monthKey(sheetY,m)]&&Object.values(reHist[monthKey(sheetY,m)]).some(v=>v>0);
    return `<button class="m-chip ${isSel?'sel':''} ${future?'future':''}" onclick="pickMonth(${m})">${m}월<div class="m-dot">${hasDot?'●':''}</div></button>`;
  }).join('');
}
function pickMonth(m){ selY=sheetY; selM=m; closeMonthSheet(); renderPage(); }

/* ══════════════════════
   편집 모달
══════════════════════ */
function openEditModal(){ showEditMain(); document.getElementById('editOverlay').classList.add('active'); }
function closeEditModal(){ document.getElementById('editOverlay').classList.remove('active'); }

function showEditMain(){
  const listHTML=reList.length?reList.map(re=>`
    <div class="edit-item">
      <div class="ei-icon">🏠</div>
      <div class="ei-info">
        <div class="ei-name">${re.name}</div>
        <div class="ei-sub">${PROP_TYPES.find(t=>t.k===re.type)?.l||''} · ${re.area||''}㎡</div>
      </div>
      <div class="ei-actions">
        <button class="btn-ea" onclick="showForm(${re.id})">수정</button>
        <button class="btn-ea del" onclick="deleteRE(${re.id})">삭제</button>
      </div>
    </div>`).join(''):'<div style="color:#555;font-size:13px;padding:8px 0">등록된 부동산이 없어요</div>';

  document.getElementById('editContent').innerHTML=`
    <div class="modal-title">부동산 편집</div>
    <div class="edit-list">${listHTML}</div>
    <button class="btn-add" onclick="showForm(null)">＋ 부동산 추가하기</button>`;
}

function showForm(id){
  const p=id?reList.find(x=>x.id===id):{};
  const isEdit=!!id;
  const loans=loadLoans();
  const extras=(p.extraCosts||[{label:'확장비',amount:''},{label:'옵션비',amount:''},{label:'법무사·취등록세',amount:''}]);

  document.getElementById('editContent').innerHTML=`
    <div class="modal-title">${isEdit?'부동산 수정':'부동산 추가'}</div>
    <div class="add-form">

      <div class="fsec">기본 정보</div>
      <div class="f-row"><div class="f-label">단지·건물명</div>
        <input class="f-input" id="fName" type="text" placeholder="예) OO아파트 101동 1001호" value="${p.name||''}">
      </div>
      <div class="f-row-3">
        ${PROP_TYPES.map(t=>`<button class="type-btn ${(p.type||'apt')===t.k?'active':''}" data-v="${t.k}" onclick="pickType(this,'typeGrid')">${t.l}</button>`).join('')}
      </div>
      <div class="f-row-2">
        <div class="f-row"><div class="f-label">전용면적 (㎡)</div><input class="f-input" id="fArea" type="number" inputmode="decimal" placeholder="예) 84.9" value="${p.area||''}"></div>
        <div class="f-row"><div class="f-label">동호수</div><input class="f-input" id="fDong" type="text" placeholder="예) 101동 1001호" value="${p.dong||''}"></div>
      </div>

      <div class="fsec">준공 상태</div>
      <div class="f-row">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px" id="statusGrid">
          ${STATUS_TYPES.map(t=>`<button class="type-btn ${(p.status||'pre')===t.k?'active':''}" data-v="${t.k}" onclick="pickType(this,'statusGrid')">${t.l}</button>`).join('')}
        </div>
      </div>

      <div class="fsec">취득 원가</div>
      <div class="f-row"><div class="f-label">분양가 (원)</div>
        <input class="f-input" id="fSalePrice" type="number" inputmode="numeric" placeholder="0" value="${p.salePrice||''}">
      </div>
      <div id="extraCostsWrap">
        ${extras.map((c,i)=>`
          <div class="f-row">
            <div class="f-label">${c.label}</div>
            <input class="f-input extra-cost" data-label="${c.label}" type="number" inputmode="numeric" placeholder="0" value="${c.amount||''}">
          </div>`).join('')}
      </div>

      <div class="fsec">연결 대출</div>
      <div class="f-row"><div class="f-label">대출탭에서 연결</div>
        <select class="f-input" id="fLoanId" style="color:#fff;background:#2e2e2e">
          <option value="">연결 안함</option>
          ${loans.map(l=>`<option value="${l.id}" ${p.loanId===l.id?'selected':''}>${l.name} (${Math.round(l.balance/10000)}만원)</option>`).join('')}
        </select>
      </div>

      <div class="fsec">임대 현황</div>
      <div class="f-row">
        <div class="f-label">임대 유형</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px" id="rentGrid">
          ${RENT_TYPES.map(t=>`<button class="type-btn ${(p.rentType||'none')===t.k?'active':''}" data-v="${t.k}" onclick="pickRentType(this)">${t.l}</button>`).join('')}
        </div>
      </div>
      <div id="rentFields" style="${(!p.rentType||p.rentType==='none')?'display:none':''}">
        <div class="f-row"><div class="f-label">보증금 (원)</div><input class="f-input" id="fRentDep" type="number" inputmode="numeric" placeholder="0" value="${p.rentDeposit||''}"></div>
        <div class="f-row" id="monthlyRow" style="${p.rentType==='jeon'?'display:none':''}">
          <div class="f-label">월세 (원)</div><input class="f-input" id="fRentMo" type="number" inputmode="numeric" placeholder="0" value="${p.rentMonthly||''}">
        </div>
        <div class="f-row-2">
          <div class="f-row"><div class="f-label">계약 시작일</div><input class="f-input" id="fRentStart" type="date" value="${p.rentStart||''}"></div>
          <div class="f-row"><div class="f-label">계약 만기일</div><input class="f-input" id="fRentEnd" type="date" value="${p.rentEnd||''}"></div>
        </div>
      </div>

      <button class="btn-submit" onclick="${isEdit?`updateRE(${id})`:'addRE()'}">${isEdit?'저장하기':'추가하기'}</button>
      <button class="btn-cancel" onclick="showEditMain()">취소</button>
    </div>`;
}

function pickType(btn, gridId){
  btn.closest(`#${gridId}`)?.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  // gridId 없이 부모에서 찾기
  btn.parentElement.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function pickRentType(btn){
  btn.parentElement.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const v=btn.dataset.v;
  document.getElementById('rentFields').style.display=v==='none'?'none':'';
  const mr=document.getElementById('monthlyRow');
  if(mr) mr.style.display=v==='jeon'?'none':'';
}

function readForm(){
  const name     = document.getElementById('fName').value.trim();
  const type     = document.querySelector('#editContent .type-btn.active[data-v="apt"], #editContent .type-btn.active[data-v="villa"], #editContent .type-btn.active[data-v="land"]')?.dataset.v||'apt';
  const area     = parseFloat(document.getElementById('fArea').value)||0;
  const dong     = document.getElementById('fDong').value.trim();
  const status   = document.querySelector('#statusGrid .type-btn.active')?.dataset.v||'pre';
  const salePrice= parseInt(document.getElementById('fSalePrice').value)||0;
  const loanIdRaw= document.getElementById('fLoanId').value;
  const loanId   = loanIdRaw?parseInt(loanIdRaw)||loanIdRaw:null;
  const rentType = document.querySelector('#rentGrid .type-btn.active')?.dataset.v||'none';
  const rentDeposit = parseInt(document.getElementById('fRentDep')?.value)||0;
  const rentMonthly = parseInt(document.getElementById('fRentMo')?.value)||0;
  const rentStart= document.getElementById('fRentStart')?.value||'';
  const rentEnd  = document.getElementById('fRentEnd')?.value||'';

  const extraCosts=[];
  document.querySelectorAll('.extra-cost').forEach(el=>{
    const amt=parseInt(el.value)||0;
    if(amt>0) extraCosts.push({label:el.dataset.label, amount:amt});
  });

  if(!name){alert('단지명을 입력해주세요.');return null;}
  return {name,type,area,dong,status,salePrice,extraCosts,loanId,rentType,rentDeposit,rentMonthly,rentStart,rentEnd};
}

function addRE(){
  const d=readForm(); if(!d)return;
  d.id=Date.now(); reList.push(d); saveRE(reList);
  showEditMain(); renderPage();
}
function updateRE(id){
  const d=readForm(); if(!d)return;
  const idx=reList.findIndex(x=>Number(x.id)===Number(id));
  if(idx!==-1) reList[idx]={...reList[idx],...d};
  saveRE(reList); showEditMain(); renderPage();
}
function deleteRE(id){
  reList=reList.filter(x=>Number(x.id)!==Number(id));
  // 히스토리에서도 제거
  Object.keys(reHist).forEach(mk=>{delete reHist[mk][id];});
  saveRE(reList); saveHist(reHist); showEditMain(); renderPage();
}


let _trashCb = null;
function openTrashModal(title, desc, cb){ document.getElementById('trsTitle').textContent=title; document.getElementById('trsDesc').innerHTML=desc; _trashCb=cb; document.getElementById('trashOverlay').classList.add('active'); }
function closeTrashModal(){ document.getElementById('trashOverlay').classList.remove('active'); _trashCb=null; }
function confirmTrash(){ if(_trashCb)_trashCb(); closeTrashModal(); }

function openMonthTrash(){
  const mk = monthKey(selY, selM);
  const hasData = reHist[mk] && Object.values(reHist[mk]).some(v=>v>0);
  if(!hasData){ alert(selM+'월에 입력된 시세가 없어요.'); return; }
  openTrashModal(
    selM+'월 시세 초기화',
    `<strong>${selY}년 ${selM}월</strong>에 입력된<br>모든 부동산 시세가 삭제돼요.`,
    ()=>{ delete reHist[monthKey(selY,selM)]; saveHist(reHist); renderPage(); }
  );
}
renderPage();
</script>
</body>
</html>
